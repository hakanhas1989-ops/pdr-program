      .then(reg => console.log("SW registered"))

  });
}

// Storage API — localStorage tabanlı
window.storage = {
  get: async (key) => {
    try {
      const v = localStorage.getItem("pdr__" + key);
      return v ? { key, value: v } : null;
    } catch { return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem("pdr__" + key, value);
      return { key, value };
    } catch { return null; }
  },
  delete: async (key) => {
    localStorage.removeItem("pdr__" + key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("pdr__" + (prefix || ""))) {
        keys.push(k.replace("pdr__", ""));
      }
    }
    return { keys };
  }
};
</script>

<script type="text/babel" data-type="module">

const LGS_KOCLUK = "Sen Dr. Ayse Kara'sin. 20 yillik klinik deneyime sahip PDR uzmani, psikolog ve ogrenci kocusun. BDT, baglanma teorisi ve gelisim psikolojisi perspektifinden analiz yaparsın. LGS PUAN REHBERI (2024 yaklasik): 85 ustu net = yuzde 1-5 = en iyi Anadolu Liseleri. 75-85 net = yuzde 5-15 = iyi Anadolu Liseleri. 60-75 net = yuzde 15-35 = orta-iyi Anadolu Liseleri. 45-60 net = yuzde 35-60 = Anadolu Liseleri. 30-45 net = yuzde 60-80 = Imam Hatip Anadolu. 30 alti = yuzde 80 ustu = Mahalle Lisesi veya Meslek Lisesi. CALISMA KOÇLUGU: Hata analizi yap o konulara yogunlas. Aralikli tekrar (1-3-7-30 gun). Aktif ogrenme: sorular coz ozetle. Kolay sorudan zora. BDT ile kaygı yonetimi. Deneme ortalamasina gore somut hedef okul turu belirt. Turkce yaz, sade ve anlasilir ol, markdown kullanma.";

const EMPTY_SCORES = { akademik: 3, sosyal: 3, duygusal: 3, aile: 3, ozguven: 3, uyum: 3, kariyer: 3, akran: 3 };

// ── API ───────────────────────────────────────────────────────────────────────

async function getRiskAnalizi(riskForm, gorusmeler, profil1) {
  const gorusmeBolum = gorusmeler.length > 0
    ? "GÖRÜŞME NOTLARI:\n" + gorusmeler.map((r,i)=>`Görüşme ${i+1} (${r.date}): ${r.summary}`).join("\n\n")
    : "Görüşme kaydı yok.";
  const profilBolum = profil1
    ? "PDR PROFİL PUANLARI:\n" + Object.entries(profil1.scores||{}).map(([k,v])=>`${k}: ${v}/5`).join(", ")
    : "";
  const prompt = `Öğrenci: ${riskForm.studentName} (${riskForm.className})
Risk Türü: ${riskForm.riskTuru}
Öncelik: ${riskForm.oncelik}
Açıklama: ${riskForm.aciklama}

${gorusmeBolum}
${profilBolum}

Bu öğrencinin risk durumunu değerlendir:

RİSK DÜZEYİ: (HAFİF / ORTA / YÜKSEK — net belirt)
RİSK DEĞERLENDİRMESİ: (Bu risk neden önemli, nasıl yorumlanmalı — 2-3 cümle)
KORUYUCU FAKTÖRLER: (Öğrencinin güçlü yönleri ve koruyucu faktörler)
ACİL MÜDAHALE GEREKTİRİR Mİ: (Evet/Hayır — gerekçesiyle)
ÖNERİLEN ADIMLAR:
1.
2.
3.

Sade, PDR diline uygun yaz. Markdown kullanma.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 2000,
      system: "Sen Dr. Ayse Kara'sin — 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT, baglanma teorisi, gelisim psikolojisi ve aile sistemleri perspektifinden risk degerlendirmesi yaparsın. Risk duzeyini net belirt: HAFIF (gunluk isleyisi minimal etkiliyor), ORTA (mudahale gerekiyor, takip sart), YUKSEK (acil mudahale, uzman yonlendirme gerekebilir).",
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

async function getDenemeAnalizi(studentName, gorusmeler, denemeGirilen) {
  const gorusmeBolum = gorusmeler.length > 0
    ? "GORUSME NOTLARI:\n" + gorusmeler.map((r,i)=>`Gorusme ${i+1} (${r.date}${r.topic?", "+r.topic:""}): ${r.summary}`).join("\n\n")
    : "Gorusme kaydi yok.";

  const denemeBolum = denemeGirilen.length > 0
    ? "DENEME SONUCLARI:\n" + denemeGirilen.map(d=>{
        const dersler = LGS_DERSLER.map(ld=>`${ld.label.substring(0,3)}: ${parseFloat(d.nets?.[ld.key]||0).toFixed(1)}/${ld.maks}`).join(", ");
        return `D${d.no}: Toplam ${d.toplam.toFixed(1)}/90 — ${dersler}`;
      }).join("\n")
    : "Deneme verisi yok.";

  const avg = denemeGirilen.length > 0
    ? (denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1) : null;
  const trend = denemeGirilen.length > 1
    ? (denemeGirilen[denemeGirilen.length-1].toplam - denemeGirilen[0].toplam).toFixed(1) : null;

  // En zayif ve guclu dersler
  let dersOrtalamalari = {};
  if (denemeGirilen.length > 0) {
    LGS_DERSLER.forEach(ld => {
      const vals = denemeGirilen.map(d => parseFloat(d.nets?.[ld.key]||0));
      dersOrtalamalari[ld.label] = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
    });
  }
  const dersSirali = Object.entries(dersOrtalamalari).sort((a,b)=>parseFloat(b[1])-parseFloat(a[1]));

  const prompt = `Ogrenci: ${studentName}
${avg ? `Deneme Ortalamasi: ${avg}/90` : ""}
${trend ? `Trend: ${parseFloat(trend)>=0?"+":""}${trend} net (ilk denemeden son denemeye)` : ""}
${dersSirali.length > 0 ? `Ders Ortalamalari: ${dersSirali.map(([k,v])=>`${k}: ${v}`).join(", ")}` : ""}

${denemeBolum}

${gorusmeBolum}

LGS hazirlik surecini kapsamli analiz et:

AKADEMIK DURUM: (Genel net performansi ve yuzdelik dilim tahmini)
HEDEF OKUL ARALIG: (Mevcut ${avg||"?"}/90 ortalamaya gore hangi liselere gidebilir — somut okul turu belirt)
TREND ANALIZI: (Gelisim mi, gerileme mi, neden — psikolojik ve akademik acikla)
DERS BAZLI ANALIZ: (En guclu ve en zayif dersler, zayif derslerde calisma onerisi)
PSIKOLOJIK BAGLAY: (Gorusme notlarina gore akademik performansi etkileyen psikolojik faktorler)
CALISMA PLANI:
1. (Hangi derse kac saat — somut plan)
2. (Deneme stratejisi)
3. (Kaygı yonetimi / motivasyon)
HEDEF: (Son denemeler icin gercekci hedef net ve hedef okul)

Sade, somut, PDR ve ogr. koçlugu diline uygun yaz. Markdown kullanma.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 4000,
      system: LGS_KOCLUK,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}


async function getScoresFromNotes(studentName, notlar) {
  const boyutlar = DIMENSIONS.map(d => d.key + " (" + d.label + ")").join(", ");
  const prompt = "Ogrenci: " + studentName + "\n\nAsagidaki notlara dayanarak ogrenciyi 8 boyutta 1-5 arasinda puanla:\n" + boyutlar + "\n\n1=Cok Dusuk, 2=Dusuk, 3=Orta, 4=Iyi, 5=Cok Iyi. Notlarda bilgi yoksa 3 ver.\n\nNotlar:\n" + notlar + "\n\nSADECE su formatta JSON dondur:\n{\"akademik\":X,\"sosyal\":X,\"duygusal\":X,\"aile\":X,\"ozguven\":X,\"uyum\":X,\"kariyer\":X,\"akran\":X}";
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 200,
      system: "Sen 20 yillik klinik deneyime sahip PDR uzmani Dr. Ayse Kara'sin. Gorusme notlarini analiz edip SADECE JSON formatinda puan dondur. Baska hicbir sey yazma.",
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || "{}";
  try {
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    const clamped = {};
    DIMENSIONS.forEach(d => { clamped[d.key] = Math.min(5, Math.max(1, Math.round(parsed[d.key] || 3))); });
    return clamped;
  } catch { return { ...EMPTY_SCORES }; }
}

async function getP2Analiz({ studentName, className, sinavlar, d2, ilgiler, kariyer_hedef, aile_notu, gorusmeler, denemeGirilen }) {
  const dersMetni = DERSLER.map(d => {
    const v1 = parseFloat(sinavlar?.[d.key+"1"]);
    const v2 = parseFloat(sinavlar?.[d.key+"2"]);
    const vo = parseFloat(sinavlar?.[d.key]);
    if (!isNaN(v1) && !isNaN(v2)) return `${d.label}: 1.Yazili ${v1}, 2.Yazili ${v2}, Ort ${((v1+v2)/2).toFixed(1)}/100`;
    if (!isNaN(v1)) return `${d.label}: 1.Yazili ${v1}/100`;
    if (!isNaN(v2)) return `${d.label}: 2.Yazili ${v2}/100`;
    if (!isNaN(vo)) return `${d.label}: ${vo}/100`;
    return null;
  }).filter(Boolean).join(", ");

  const d2Metni = d2 && (d2.TN || d2.TN_E) ? `D2 Dikkat Testi: TN=${d2.TN||"—"}, E1=${d2.E1||"—"}, E2=${d2.E2||"—"}, TN-E=${d2.TN_E||"—"}, E%=${d2.E_yuzde||"—"}, PR=${d2.PR||"—"}` : "";

  const denemeBolum = denemeGirilen && denemeGirilen.length > 0
    ? "DENEME SONUCLARI:\n" + denemeGirilen.map(d => {
        const dersler = LGS_DERSLER.map(ld => `${ld.label.substring(0,3)}: ${parseFloat(d.nets?.[ld.key]||0).toFixed(1)}`).join(", ");
        return `D${d.no}: ${d.toplam.toFixed(1)}/90 (${dersler})`;
      }).join("\n")
    : "";

  const avg = denemeGirilen && denemeGirilen.length > 0
    ? (denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1)
    : null;

  const prompt = `Ogrenci: ${studentName}${className ? `, Sinif: ${className}` : ""}
${gorusmeler ? "\nGORUSME NOTLARI:\n" + gorusmeler : ""}
YAZILI SINAV PUANLARI: ${dersMetni || "Girilmemis"}
${d2Metni}
${denemeBolum}
${avg ? `Deneme Ortalamasi: ${avg}/90` : ""}
Ilgi Alanlari: ${ilgiler?.join(", ") || "Belirtilmemis"}
Kariyer Hedefi: ${kariyer_hedef || "Belirtilmemis"}
Aile Notu: ${aile_notu || "Yok"}

Bu ogrencinin akademik ve dikkat profil analizini yap:

AKADEMIK DURUM: (yazili sinav puanlarina gore guclu/zayif dersler, genel akademik profil)
DIKKAT PROFİLİ: ${d2Metni ? "(D2 sonuclarini yorumla — TN psikomotor hiz, E1 secici dikkat, TN-E performans, E% hata orani, PR yuzdelik. Dikkat destegi gerekip gerekmedigini belirt)" : "(D2 verisi girilmemis)"}
DENEME ANALİZİ: ${avg ? `(Deneme ortalamasi ${avg}/90 — LGS hedef okul araligini belirt, gidebilecegi liseleri soylet, trend varsa yorum yap)` : "(Deneme verisi yok)"}
İLGİ-KARİYER UYUMU: (ilgi alanlari ile kariyer hedefi arasindaki uyum)
LGS CALISMA ONERISI: (ders bazli somut calisma stratejisi, hangi derse ne kadar agirlik verilmeli)
ONERILER:
1. (Akademik destek)
2. (Psikolojik destek)  
3. (Aile/cevre onerisi)

Sade, PDR diline uygun, somut yaz. Markdown kullanma.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 4000,
      system: LGS_KOCLUK,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}



async function getAISummary(rawText) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 1000,
      system: `Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip, okul psikolojik danismanligi alaninda uzmanlasmis bir psikolog ve PDR uzmanisin. Bilissel Davranisci Terapi (BDT) temel yonelimindir: otomatik dusunceler, bilissel carpitmalar, sema teorisi, davranissal aktivasyon ve maruz birakma tekniklerini klinik pratikte ustaca kullanirsin. Baglanma teorisi (Bowlby, Ainsworth), aile sistemleri terapisi (Minuchin, Bowen) ve gelisim psikolojisi (Piaget, Vygotsky, Erikson) perspektifinden bireyi cevresiyle birlikte degerlendirirsin. Sosyolojide Bourdieu'nun habitus ve kulturel sermaye kavramlari, Giddens'in yapilasmasi ve sosyal tabakalasmanin psikolojik etkilerini Turkiye baglaminda okursun: aile baskisi, toplumsal cinsiyet rolleri, sinav odakli egitimin cocuk uzerindeki yukunu sosyolojik zemine oturtursun. Felsefi temetin: Frankl anlam terapisi, Sartre sorumluluk etigi, Stoa kontrol alani, fenomenolojinin oznel deneyim odagi. Uslubun: yargilamayan, merak eden, guclu yonlere odaklanan, somut ve uygulanabilir oneriler sunan, Turkce yazan, PDR diline hakim bir klinisyen.

GOREV - GORUSME NOTU OZETI: Danismanin anlattigi gorusme notunu kisa ve net ozete donustur. Basliklar (sadece ilgililer): Ogrenci durumu (BDT: bilissel-duygusal-davranissal oruntu), Gorusmede one cikan (baglanma, otomatik dusunceler, stres-basa cikma, sosyal dinamikler, varolussel temalar), Yapilan/planlanan, Takip notu. Max 5-6 cumle. Sade PDR dili. JSON veya markdown kullanma.`,
      messages: [{ role: "user", content: rawText }],
    }),
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

async function getProfileAnalysis(studentName, className, scores, notes, kutuphaneOzetleri = []) {
  const boyutlar = DIMENSIONS.map(d => `${d.label}: ${scores[d.key] || 0}/5`).join(", ");
  const kutuphaneBaglam = kutuphaneOzetleri.length > 0
    ? "\n\nKÜTÜPHANE REFERANSLARI:\n" + kutuphaneOzetleri.map((k, i) => `[${i+1}] ${k.baslik}:\n${k.ozet}`).join("\n\n")
    : "";
  const onerilerNot = kutuphaneOzetleri.length > 0 ? ", kütüphane referanslarından yararlan" : "";
  const prompt = `Öğrenci: ${studentName}, Sınıf: ${className}
Rehberlik Profil Puanları (1-5): ${boyutlar}
${notes ? `Ek notlar: ${notes}` : ""}${kutuphaneBaglam}

Bu öğrencinin PDR profil analizini yaz. Şu yapıyı kullan:
GÜÇLÜ YÖNLER: (yüksek puan alan boyutlar hakkında 1-2 cümle)
GELİŞİM ALANLARI: (düşük puan alan boyutlar hakkında 1-2 cümle)
ÖNERİLER: (danışman olarak yapılabilecek 2-3 somut öneri${onerilerNot})
RİSK NOTU: (varsa dikkat edilmesi gereken bir şey, yoksa "Belirgin risk faktörü gözlemlenmedi" yaz)

Sade, profesyonel ve PDR diline uygun yaz. Markdown veya JSON kullanma.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 2000,
      system: `Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin.

COK KAYNAKLI CERCEVE:

BOYUT-TEORİ EŞLEŞTİRMESİ:
- Akademik Gelişim → Bandura'nın Öz-Yeterlilik Teorisi, Vygotsky'nin Yakınsak Gelişim Alanı
- Sosyal Beceriler → Sosyal Öğrenme Teorisi, Goleman'ın Duygusal Zeka Modeli
- Duygusal Denge → Duygu Düzenleme Teorisi (Gross), Lazarus'un Stres-Başa Çıkma Modeli
- Aile İlişkileri → Bowlby'nin Bağlanma Teorisi, Bronfenbrenner'in Ekolojik Sistem Teorisi
- Öz Güven → Adler'in Bireysel Psikoloji, Maslow'un İhtiyaçlar Hiyerarşisi
- Okul Uyumu → MEB Okul Rehberlik Hizmetleri Yönergesi, Ekosistem uyum modeli
- Kariyer Farkındalığı → Super'in Kariyer Gelişim Teorisi, Holland'ın RIASEC Modeli
- Akran İlişkileri → Sullivan'ın Kişilerarası Teori, Sosyometri (Moreno)

MEB OKUL REHBERLİK ÇERÇEVESİ:
- Bireysel farkındalık ve kendini tanıma kazanımları
- Sosyal-duygusal öğrenme becerileri
- Akademik gelişim ve öğrenme stratejileri
- Kariyer gelişimi ve yaşam becerileri
- Aile ve çevre ilişkileri

Analiz yaparken:
1. Her boyutu ilgili teorik çerçeveden yorumla
2. MEB rehberlik kazanımlarına atıfta bulun

// Kapasite kontrolü
async function storageKapasite() {
  try {
    let total = 0;
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("pdr__")) total += (localStorage.getItem(k)||"").length * 2;
    }
    const mb = (total/1024/1024).toFixed(2);
    return { used: parseFloat(mb), limit: 5, yuzde: Math.round((parseFloat(mb)/5)*100) };
  } catch { return { used:0, limit:5, yuzde:0 }; }
}

// Büyük array'leri chunk'lara böl (görüşme notları için)
async function saveChunked(baseKey, items) {
  const CHUNK = 80;
  if (items.length <= CHUNK) {
    await window.storage.set(baseKey, JSON.stringify(items));
    await window.storage.delete(baseKey + "-meta");
    return;
  }
  const chunkCount = Math.ceil(items.length/CHUNK);
  await window.storage.set(baseKey + "-meta", JSON.stringify({ chunks: chunkCount }));
  for (let i=0; i<chunkCount; i++) {
    await window.storage.set(baseKey + "-c" + i, JSON.stringify(items.slice(i*CHUNK, (i+1)*CHUNK)));
  }
}

async function loadChunked(baseKey) {
  try {
    const meta = await window.storage.get(baseKey + "-meta");
    if (!meta) {
      const r = await window.storage.get(baseKey);
      return r ? JSON.parse(r.value) : [];
    }
    const { chunks } = JSON.parse(meta.value);
    let all = [];
    for (let i=0; i<chunks; i++) {
      const c = await window.storage.get(baseKey + "-c" + i);
      if (c) all = all.concat(JSON.parse(c.value));
    }
    return all;
  } catch { return []; }
}

function degBoyutPuan(cevaplar, key) {
  const vals = Object.values(cevaplar[key] || {});
  if (!vals.length) return null;
  return parseFloat((vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1));
}
function degTumPuanlar(cevaplar) {
  const p = {};
  DEG_SORULAR.forEach(b => { const v = degBoyutPuan(cevaplar, b.key); if (v !== null) p[b.key] = v; });
  return p;
}
function degTamamlanma(cevaplar) {
  let total = 0, done = 0;
  DEG_SORULAR.forEach(b => { b.sorular.forEach((_, i) => { total++; if (cevaplar[b.key]?.[i] !== undefined) done++; }); });
  return Math.round((done / total) * 100);
}

async function getDegerlendirmeAnalysis(studentName, className, cevaplar, notlar) {
  const boyutMetni = DEG_SORULAR.map(b => {
    const bC = cevaplar[b.key] || {};
    const sorular = b.sorular.map((s, i) => `  - ${s}: ${bC[i] !== undefined ? DEG_SECENEKLER.find(x => x.val === bC[i])?.label : "Yanıtlanmadı"}`).join("\n");
    return `${DIMENSIONS.find(d => d.key === b.key)?.label || b.key}:\n${sorular}${notlar[b.key] ? `\n  Not: ${notlar[b.key]}` : ""}`;
  }).join("\n\n");
  const puanOzet = DEG_SORULAR.map(b => {
    const p = degBoyutPuan(cevaplar, b.key);
    return `${DIMENSIONS.find(d => d.key === b.key)?.label}: ${p ?? "?"}/5`;
  }).join(", ");

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 2000,
      system: `Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin.

DEGERLENDIRME CERCEVESI:

BOYUT-TEORİ EŞLEŞTİRMESİ:
- Akademik Gelişim → Bandura öz-yeterlilik, Vygotsky yakınsak gelişim alanı
- Sosyal Beceriler → Goleman duygusal zeka, Sosyal öğrenme teorisi
- Duygusal Denge → Gross duygu düzenleme, Lazarus stres-başa çıkma
- Aile İlişkileri → Bowlby bağlanma teorisi, Bronfenbrenner ekolojik sistem
- Öz Güven → Adler bireysel psikoloji, Maslow ihtiyaçlar hiyerarşisi
- Okul Uyumu → MEB rehberlik yönergesi, Ekosistem uyum modeli
- Kariyer Farkındalığı → Super kariyer gelişim, Holland RIASEC modeli
- Akran İlişkileri → Sullivan kişilerarası teori, Moreno sosyometri

MEB OKUL REHBERLİK ÇERÇEVESİ: Bireysel farkındalık, sosyal-duygusal öğrenme, akademik gelişim, kariyer gelişimi, aile-çevre ilişkileri kazanımları.

Analiz yaparken: Her boyutu ilgili teorik çerçeveden yorumla, hangi teoriden baktığını belirt, MEB kazanımlarına atıfta bulun, pratik ve uygulanabilir öneriler ver. Markdown veya JSON kullanma.`,
      messages: [{ role: "user", content: `Öğrenci: ${studentName}${className ? `, Sınıf: ${className}` : ""}\nPuan Özeti: ${puanOzet}\n\n${boyutMetni}\n\nBu öğrencinin PDR analizini şu yapıda yaz:\nGENEL DEĞERLENDİRME: (öğrencinin genel profilini teorik perspektiften 2-3 cümle)\nGÜÇLÜ YÖNLER: (hangi teoriye göre güçlü olduğunu belirt)\nGELİŞİM ALANLARI: (hangi teorik çerçeveden müdahale önerilebileceğini belirt)\nÖNERİLER: (teorik temelli 3 somut öneri, kaynağını belirt)\nRİSK NOTU: (varsa teorik dayanaklı risk değerlendirmesi)` }],
    }),
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

// ── Rapor İndirme Yardımcısı (mobil uyumlu) ────────────────────────────────────
async function raporIndir(elementId, dosyaAdi) {
  const el = document.getElementById(elementId);
  if (!el) { alert("Rapor bulunamadı."); return; }

  // Rapor içeriğini al
  const icerik = el.innerHTML;
  const htmlStr = `<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${dosyaAdi}</title>
<style>
  @page { size: A4; margin: 12mm; }
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #1a1a1a; background: #fff; padding: 0; margin: 0; }
  @media print {
    .noprint { display: none !important; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media screen {
    body { padding: 20px; max-width: 800px; margin: 0 auto; }
  }
  table { width: 100%; border-collapse: collapse; }
  svg { max-width: 100%; }
</style>
</head>
<body>
<div class="noprint" style="position:fixed;top:0;left:0;right:0;background:#2D6A4F;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:999;font-family:Arial,sans-serif;">
  <span style="font-weight:700;font-size:15px;">📄 ${dosyaAdi}</span>
  <div style="display:flex;gap:10px;">
    <button onclick="window.print()" style="background:#fff;color:#2D6A4F;border:none;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:800;cursor:pointer;">🖨️ Yazdır / PDF Kaydet</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;">✕</button>
  </div>
</div>
<div style="margin-top:60px;">${icerik}</div>
</body>
</html>`;

  // Yöntem 1: Yeni sekme (masaüstü)
  try {
    const w = window.open("", "_blank");
    if (w && !w.closed) {
      w.document.open();
      w.document.write(htmlStr);
      w.document.close();
      return;
    }
  } catch(e) {}

  // Yöntem 2: Blob + link (mobil)
  try {
    const blob = new Blob([htmlStr], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = dosyaAdi + ".html";
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
    return;
  } catch(e) {}

  // Yöntem 3: Data URI (son çare)
  try {
    const encoded = encodeURIComponent(htmlStr);
    window.location.href = "data:text/html;charset=utf-8," + encoded;
  } catch(e) {
    alert("PDF indirilemedi. Ekran görüntüsü alabilirsiniz.");
  }
}

// ── Excel Export ──────────────────────────────────────────────────────────────// ── Excel Export ──────────────────────────────────────────────────────────────
function exportToExcel(records) {
  const data = records.map(r => ({
    "Tarih": r.date, "Öğrenci": r.studentName, "Sınıf": r.className || "",
    "Görüşme Türü": r.meetingType || "Öğrenci", "Konu": r.topic || "", "Özet": r.summary,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{ wch: 12 }, { wch: 22 }, { wch: 8 }, { wch: 14 }, { wch: 18 }, { wch: 60 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Görüşme Kayıtları");
  const topicCount = {}, typeCount = { "Öğrenci": 0, "Veli": 0 };
  const studentSet = new Set(), parentSet = new Set(), monthCount = {};
  records.forEach(r => {
    const topic = r.topic || "Belirtilmemiş"; topicCount[topic] = (topicCount[topic] || 0) + 1;
    const type = r.meetingType || "Öğrenci"; typeCount[type] = (typeCount[type] || 0) + 1;
    if (type === "Öğrenci") studentSet.add(r.studentName); else parentSet.add(r.studentName);
    const parts = r.date?.split(".");
    if (parts?.length === 3) { const key = `${parts[1]}/${parts[2]}`; monthCount[key] = (monthCount[key] || 0) + 1; }
  });
  const statRows = [
    ["PDR SERVİSİ — GÖRÜŞME İSTATİSTİKLERİ"], [],
    ["GENEL"], ["Toplam Görüşme", records.length],
    ["Farklı Öğrenci Sayısı", studentSet.size], ["Farklı Veli Sayısı", parentSet.size], [],
    ["GÖRÜŞME TÜRÜ"], ["Öğrenci Görüşmesi", typeCount["Öğrenci"] || 0], ["Veli Görüşmesi", typeCount["Veli"] || 0], [],
    ["KONULARA GÖRE"], ...Object.entries(topicCount).sort((a, b) => b[1] - a[1]).map(([k, v]) => [k, v]), [],
    ["AYLARA GÖRE"], ...Object.entries(monthCount).sort().map(([k, v]) => [k, v]),
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(statRows);
  ws2["!cols"] = [{ wch: 28 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws2, "İstatistikler");
  XLSX.writeFile(wb, `PDR_Kayitlar_${today().replace(/\./g, "-")}.xlsx`);
}

// ── Radar SVG ─────────────────────────────────────────────────────────────────
function RadarChart({ scores }) {
  const cx = 120, cy = 120, r = 90, n = DIMENSIONS.length;
  const angleStep = (2 * Math.PI) / n;
  const getPoint = (i, val, maxVal = 5) => {
    const angle = i * angleStep - Math.PI / 2;
    const dist = (val / maxVal) * r;
    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
  };
  const dataPoints = DIMENSIONS.map((d, i) => getPoint(i, scores[d.key] || 0));
  const dataPath = dataPoints.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ") + " Z";
  const gridLevels = [1, 2, 3, 4, 5];

  return (
    <svg width={240} height={240} viewBox="0 0 240 240">
      {/* Grid */}
      {gridLevels.map(level => {
        const pts = DIMENSIONS.map((_, i) => getPoint(i, level));
        return <polygon key={level} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
          fill="none" stroke={BORDER} strokeWidth={1} />;
      })}
      {/* Axes */}
      {DIMENSIONS.map((_, i) => {
        const outer = getPoint(i, 5);
        return <line key={i} x1={cx} y1={cy} x2={outer.x} y2={outer.y} stroke={BORDER} strokeWidth={1} />;
      })}
      {/* Data */}
      <polygon points={dataPoints.map(p => `${p.x},${p.y}`).join(" ")}
        fill={`${ACCENT}33`} stroke={ACCENT} strokeWidth={2} />
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={4} fill={DIMENSIONS[i].color} stroke="#fff" strokeWidth={1.5} />
      ))}
      {/* Labels */}
      {DIMENSIONS.map((d, i) => {
        const angle = i * angleStep - Math.PI / 2;
        const lx = cx + (r + 18) * Math.cos(angle);
        const ly = cy + (r + 18) * Math.sin(angle);
        return (
          <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
            fontSize={9} fill={TEXT} fontWeight={600}>
            {d.label.split(" ").map((w, wi) => (
              <tspan key={wi} x={lx} dy={wi === 0 ? 0 : 11}>{w}</tspan>
            ))}
          </text>
        );
      })}
    </svg>
  );
}

        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {ort && <span style={{ background: BLUE, color:"#fff", borderRadius: 20, padding: "2px 10px", fontSize: 12, fontWeight: 800 }}>Ort: {ort}</span>}
          {p.ilgiler?.length > 0 && <span style={{ background: "#FEF9C3", color:"#92400E", borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>{p.ilgiler.length} ilgi</span>}
        </div>
        <span style={{ color: MUTED, fontSize: 18 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ padding: 16 }}>
          {/* Sınav Puanları */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Sınav Puanları</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {DERSLER.map(d => {
                const val = parseFloat(p.sinavlar?.[d.key]);
                if (!p.sinavlar?.[d.key] && p.sinavlar?.[d.key] !== 0) return null;
                const pct = Math.min(100, (val / 100) * 100);
                return (
                  <div key={d.key} style={{ background: BG, borderRadius: 8, padding: "8px 10px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 11, color: TEXT, fontWeight: 600 }}>{d.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 800, color: d.color }}>{val}</span>
                    </div>
                    <div style={{ height: 4, background: BORDER, borderRadius: 3 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: d.color, borderRadius: 3 }} />
                    </div>
                  </div>
                );
              })}
            </div>
            {ort && <div style={{ marginTop: 8, textAlign: "right", fontSize: 13, color: BLUE, fontWeight: 700 }}>Genel Ortalama: {ort}</div>}
          </div>

          {/* İlgi Alanları */}
          {p.ilgiler?.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Kişisel Gelişim & İlgi Profili</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {p.ilgiler.map(ilgi => (
                  <span key={ilgi} style={{ background: "#FEF9C3", color: "#92400E", borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 600 }}>{ilgi}</span>
                ))}
              </div>
              {p.ilgiNot && <div style={{ marginTop: 8, fontSize: 12, color: MUTED, lineHeight: 1.6 }}>{p.ilgiNot}</div>}
            </div>
          )}

          {/* D2 Dikkat Testi */}
          {p.d2 && (p.d2.TN || p.d2.TN_E) && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: PURPLE, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>D2 Dikkat Testi</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
                {[
                  { label: "TN", val: p.d2.TN, acik: "Psikomotor hız" },
                  { label: "E1", val: p.d2.E1, acik: "Seçici dikkat" },
                  { label: "E2", val: p.d2.E2, acik: "Öğrenme güçlüğü" },
                  { label: "CP", val: p.d2.CP, acik: "Perf. kalitesi" },
                  { label: "FR", val: p.d2.FR, acik: "Hız salınımı" },
                  { label: "PR", val: p.d2.PR, acik: "Yüzdelik" },
                ].filter(x => x.val).map(x => (
                  <div key={x.label} style={{ background: "#F3F0FF", borderRadius: 8, padding: "6px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 15, fontWeight: 800, color: PURPLE }}>{x.val}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>{x.label}</div>
                    <div style={{ fontSize: 9, color: MUTED }}>{x.acik}</div>
                  </div>
                ))}
              </div>
              {(p.d2.TN_E || p.d2.E_yuzde) && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
                  {p.d2.TN_E && <div style={{ background: "#EDE9FF", borderRadius: 8, padding: "8px", textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: PURPLE }}>{p.d2.TN_E}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>TN-E</div>
                    <div style={{ fontSize: 9, color: MUTED }}>Test Performansı</div>
                  </div>}
                  {p.d2.E_yuzde && <div style={{ background: "#EDE9FF", borderRadius: 8, padding: "8px", textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: PURPLE }}>%{p.d2.E_yuzde}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>E%</div>
                    <div style={{ fontSize: 9, color: MUTED }}>Hata Oranı</div>
                  </div>}
                </div>
              )}
              {p.d2.PR && (
                <div style={{ background: (() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "#E6F5EE" : pr >= 70 ? "#EEF2FF" : pr >= 60 ? "#FDF6E3" : "#FDECEA"; })(), borderRadius: 8, padding: "6px 10px", marginBottom: 6, fontSize: 12, fontWeight: 700, color: (() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "#1A8C5B" : pr >= 70 ? "#3B4FD8" : pr >= 60 ? "#B07D1A" : "#C0392B"; })() }}>
                  TN-E → PR {p.d2.PR} — {(() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "İYİ (≥85)" : pr >= 70 ? "NORMAL (70-85)" : pr >= 60 ? "VASAT (60-70)" : "AVERAJ (50-60)"; })()}
                </div>
              )}
              {p.d2.E_yuzde && (
                <div style={{ borderRadius: 8, padding: "8px 12px", marginBottom: 6, border: "2px solid", ...(() => {
                  const e = parseFloat(p.d2.E_yuzde);
                  if (e <= 1.5) return { background: "#E6F5EE", borderColor: "#1A8C5B", color: "#1A8C5B" };
                  if (e <= 2.5) return { background: "#FDF6E3", borderColor: "#B07D1A", color: "#B07D1A" };
                  return { background: "#FDECEA", borderColor: "#C0392B", color: "#C0392B" };
                })() }}>
                  <span style={{ fontSize: 13, fontWeight: 800 }}>E = {p.d2.E_yuzde}% → </span>
                  <span style={{ fontSize: 12 }}>{(() => {
                    const e = parseFloat(p.d2.E_yuzde);
                    if (e <= 1.5) return "NORMAL (0–1,5)";
                    if (e <= 2.5) return "DİKKAT EDİLMELİ (1,5–2,5)";
                    return "DİKKAT PROBLEMİ (2,5+)";
                  })()}</span>
                </div>
              )}
              {p.d2.yorum && <div style={{ fontSize: 12, color: TEXT, background: "#F3F0FF", borderRadius: 8, padding: "8px 10px", lineHeight: 1.6 }}>{p.d2.yorum}</div>}
              {p.d2_analiz && <div style={{ fontSize: 12, color: TEXT, background: "#EDE9FF", borderRadius: 8, padding: "10px", lineHeight: 1.7, marginTop: 6, whiteSpace: "pre-wrap" }}>{p.d2_analiz}</div>}
            </div>
          )}

          {/* Kariyer Hedef */}
          {p.kariyer_hedef && (
            <div style={{ marginBottom: 10, background: "#F0FAF4", borderRadius: 8, padding: "8px 12px" }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: ACCENT }}>Kariyer Hedefi: </span>
              <span style={{ fontSize: 13, color: TEXT }}>{p.kariyer_hedef}</span>
            </div>
          )}

          {/* Aile Notu */}
          {p.aile_notu && (
            <div style={{ marginBottom: 10, fontSize: 12, color: MUTED, lineHeight: 1.6 }}>
              <span style={{ fontWeight: 700 }}>Aile Notu: </span>{p.aile_notu}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <button onClick={() => onDelete(p.id)} style={{ background: "none", border: "1px solid #F28B82", color: "#C5221F", borderRadius: 8, padding: "4px 14px", fontSize: 12, cursor: "pointer" }}>Sil</button>
          </div>
        </div>
      )}
    </div>
  );
}


// ── Öğrenci Yönetim Bileşeni ─────────────────────────────────────────────────
// ── Sil Butonu Bileşeni ───────────────────────────────────────────────────────
function SilButonu({ onSil }) {
  const [onay, setOnay] = useState(false);
  if (onay) return (
    <div style={{ display:"flex", gap:4, flexShrink:0 }}>
      <button onClick={e => { e.stopPropagation(); onSil(); }} style={{ background:"#C0392B", color:"#fff", border:"none", borderRadius:6, padding:"5px 9px", fontSize:11, fontWeight:800, cursor:"pointer" }}>✓ Sil</button>
      <button onClick={e => { e.stopPropagation(); setOnay(false); }} style={{ background:"#f5f5f5", color:"#666", border:"1px solid #ddd", borderRadius:6, padding:"5px 8px", fontSize:11, cursor:"pointer" }}>✕</button>
    </div>
  );
  return (
    <button onClick={e => { e.stopPropagation(); setOnay(true); }} style={{ background:"none", border:"1px solid #F28B82", color:"#C5221F", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, cursor:"pointer", flexShrink:0 }}>🗑</button>
  );
}

function OgrenciYonetim({
  ogrenciler, setOgrenciler,
  records, setRecords,
  profiles, setProfiles,
  profiles2, setProfiles2,
  denemeler, setDenemeler,
  riskListesi, setRiskListesi,
  kayitliListesi, onRaporAc, setAktifOgrenci, setTab
}) {

  const [aramaMetni, setAramaMetni] = useState("");
  const [seciliOgrenci, setSeciliOgrenci] = useState(null);
  const [yeniForm, setYeniForm] = useState({ studentName:"", className:"", numara:"" });
  const [formAcik, setFormAcik] = useState(false);
  const [aktifSekme, setAktifSekme] = useState("ozet"); // ozet | gorusme | deneme | profil
  const [sinifFiltre, setSinifFiltre] = useState("Tümü");

  async function handleOgrenciSil(studentName) {
    const ad = studentName.toLowerCase().trim();
    const updOgr = ogrenciler.filter(o => o.studentName.toLowerCase().trim() !== ad);
    setOgrenciler(updOgr); await saveOgrenciler(updOgr);
    const updRec = records.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRecords(updRec); await saveRecords(updRec);
    const updP1 = profiles.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles(updP1); await saveProfiles(updP1);
    const updP2 = profiles2.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles2(updP2); await saveProfiles2(updP2);
    const updDen = { ...denemeler };
    Object.keys(updDen).forEach(k => { if (k.toLowerCase().trim() === ad) delete updDen[k]; });
    setDenemeler(updDen); await saveDenemeler(updDen);
    const updRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRiskListesi(updRisk); await saveRiskListesi(updRisk);
    if (setAktifOgrenci) setAktifOgrenci({ name: "", className: "" });
    setSeciliOgrenci(null);
  }

  // Tüm kaynaklardan öğrenci listesi — ogrenciler + kayıtlılardan
  const tumOgrenciler = (() => {
    const map = new Map();
    ogrenciler.forEach(o => map.set(o.studentName.toLowerCase().trim(), o));
    kayitliListesi.forEach(o => {
      const key = o.name.toLowerCase().trim();
      if (!map.has(key)) map.set(key, { studentName: o.name, className: o.className, numara: "" });
    });
    return [...map.values()].sort((a,b) => a.studentName.localeCompare(b.studentName, "tr"));
  })();

  const filtreliListe = tumOgrenciler.filter(o =>
    o.studentName.toLowerCase().includes(aramaMetni.toLowerCase()) ||
    o.className?.toLowerCase().includes(aramaMetni.toLowerCase()) ||
    o.numara?.includes(aramaMetni)
  );

  async function handleOgrenciSil(studentName) {
    // Direkt sil (confirm artifact'ta çalışmaz)
    const ad = studentName.toLowerCase().trim();
    // Öğrenci listesinden sil
    const updOgr = ogrenciler.filter(o => o.studentName?.toLowerCase().trim() !== ad);
    setOgrenciler(updOgr); await saveOgrenciler(updOgr);
    // Görüşme notları
    const updRec = records.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRecords(updRec); await saveRecords(updRec);
    // Profil 1
    const updP1 = profiles.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles(updP1); await saveProfiles(updP1);
    // Profil 2
    const updP2 = profiles2.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles2(updP2); await saveProfiles2(updP2);
    // Denemeler
    const updDen = { ...denemeler };
    const denKey = Object.keys(updDen).find(k => k.toLowerCase().trim() === ad);
    if (denKey) delete updDen[denKey];
    setDenemeler(updDen); await saveDenemeler(updDen);
    // Risk listesi
    const updRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRiskListesi(updRisk); await saveRiskListesi(updRisk);
    // Aktif öğrenciyi temizle
    if (aktifOgrenci?.name?.toLowerCase().trim() === ad) setAktifOgrenci({ name: "", className: "" });
    setSeciliOgrenci(null);
  }


  async function handleOgrenciEkle() {
    if (!yeniForm.studentName.trim()) return;
    const yeni = { id: uid(), ...yeniForm, tarih: today() };
    const updated = [yeni, ...ogrenciler];
    setOgrenciler(updated);
    await saveOgrenciler(updated);
    setSeciliOgrenci(yeniForm.studentName);
    if(setAktifOgrenci) setAktifOgrenci({ name: yeniForm.studentName, className: yeniForm.className });
    setYeniForm({ studentName:"", className:"", numara:"" });
    setFormAcik(false);
  }

  // Seçili öğrencinin verileri
  const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrP2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrDeneme = denemeler[seciliOgrenci] || {};
  const ogrRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim() && !r.kapandi);
  const denemeGirilen = Object.entries(ogrDeneme).sort((a,b)=>a[0]-b[0]).map(([no,nets])=>({
    no:parseInt(no), nets,
    toplam: LGS_DERSLER.reduce((s,d)=>s+(parseFloat(nets[d.key])||0),0)
  }));
  const denemeAvg = denemeGirilen.length ? (denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1) : null;

  const siniflar = [...new Set(tumOgrenciler.map(o=>o.className).filter(Boolean))].sort();

  const gosterilecek = filtreliListe.filter(o =>
    sinifFiltre === "Tümü" || o.className === sinifFiltre
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>

      {/* ── SOL: Öğrenci Listesi ─────────────────────────────────── */}
      {!seciliOgrenci ? (
        <div>
          <div style={{ background:"#EEF2FF", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:BLUE, fontWeight:600 }}>
            👥 {tumOgrenciler.length} öğrenci kayıtlı · Seç veya yeni ekle
          </div>

          {/* Arama + Ekle */}
          <div style={{ display:"flex", gap:8, marginBottom:10 }}>
            <input placeholder="Ad, sınıf veya numara ara…" value={aramaMetni}
              onChange={e => setAramaMetni(e.target.value)}
              style={{ flex:1, padding:"9px 12px", border:`1px solid ${BORDER}`, borderRadius:10, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box" }} />
            <button onClick={() => setFormAcik(f=>!f)} style={{
              background:formAcik ? BORDER : ACCENT, color:formAcik ? MUTED : "#fff",
              border:"none", borderRadius:10, padding:"9px 14px", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
            }}>+ Yeni</button>
          </div>

          {/* Yeni öğrenci formu */}
          {formAcik && (
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:14, marginBottom:12 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>AD SOYAD</label>
                  <input placeholder="Ad Soyad" value={yeniForm.studentName}
                    onChange={e => setYeniForm(f=>({...f, studentName:e.target.value}))}
                    style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>SINIF</label>
                  <input placeholder="8-A" value={yeniForm.className}
                    onChange={e => setYeniForm(f=>({...f, className:e.target.value}))}
                    style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
                </div>
              </div>
              <div style={{ marginBottom:10 }}>
                <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>ÖĞRENCİ NUMARASI</label>
                <input placeholder="örn. 1234" value={yeniForm.numara}
                  onChange={e => setYeniForm(f=>({...f, numara:e.target.value}))}
                  style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
              </div>
              <button onClick={handleOgrenciEkle} disabled={!yeniForm.studentName.trim()} style={{
                width:"100%", padding:"10px", background:yeniForm.studentName ? ACCENT : BORDER,
                color:yeniForm.studentName ? "#fff" : MUTED, border:"none", borderRadius:10, fontSize:14, fontWeight:800, cursor:"pointer"
              }}>Kaydet ve Aç</button>
            </div>
          )}

          {/* Sınıf filtresi */}
          {siniflar.length > 0 && (
            <div style={{ display:"flex", gap:5, overflowX:"auto", marginBottom:10, paddingBottom:4 }}>
              {["Tümü", ...siniflar].map(s => (
                <button key={s} onClick={() => setSinifFiltre(s)} style={{
                  flexShrink:0, padding:"4px 10px", borderRadius:14,
                  border:`1px solid ${sinifFiltre===s ? ACCENT : BORDER}`,
                  background:sinifFiltre===s ? ACCENT_LIGHT : CARD,
                  color:sinifFiltre===s ? ACCENT : MUTED,
                  fontSize:11, fontWeight:sinifFiltre===s ? 700 : 500, cursor:"pointer"
                }}>{s}</button>
              ))}
            </div>
          )}

          {/* Öğrenci listesi */}
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {gosterilecek.length === 0 && (
              <div style={{ textAlign:"center", color:MUTED, marginTop:30, fontSize:13 }}>Sonuç bulunamadı</div>
            )}
            {gosterilecek.map(o => {
              const oRec = records.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim());
              const oP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim());
              const oDen = Object.keys(denemeler[o.studentName] || {}).length;
              const oRsk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim() && !r.kapandi).length;
              const oDenAvg = oDen > 0 ? (Object.values(denemeler[o.studentName]||{}).reduce((s,nets)=>s+LGS_DERSLER.reduce((ss,d)=>ss+(parseFloat(nets[d.key])||0),0),0)/oDen).toFixed(1) : null;
              return (
                <div key={o.studentName} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:8 }}>
                  {/* Tıklanabilir alan */}
                  <div onClick={() => { setSeciliOgrenci(o.studentName); if(setAktifOgrenci) setAktifOgrenci({ name: o.studentName, className: o.className || "" }); }}
                    style={{ display:"flex", alignItems:"center", gap:10, flex:1, cursor:"pointer", minWidth:0 }}>
                    <div style={{ width:36, height:36, borderRadius:"50%", background:ACCENT_LIGHT, color:ACCENT, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:15, flexShrink:0 }}>
                      {o.studentName.charAt(0).toUpperCase()}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:700, fontSize:14, color:TEXT }}>{o.studentName}</div>
                      <div style={{ fontSize:11, color:MUTED }}>{o.className}{o.numara ? ` · No: ${o.numara}` : ""}</div>
                    </div>
                    <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                      {oRsk > 0 && <span style={{ background:"#FDECEA", color:"#C0392B", borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>⚠</span>}
                      {oRec.length > 0 && <span style={{ background:ACCENT_LIGHT, color:ACCENT, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>{oRec.length} görüşme</span>}
                      {oDenAvg && <span style={{ background:"#EEF2FF", color:BLUE, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>Ort:{oDenAvg}</span>}
                      {oP1 && <span style={{ background:ACCENT_LIGHT, color:ACCENT, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>P1</span>}
                    </div>
                    <span style={{ color:MUTED, fontSize:16, flexShrink:0 }}>›</span>
                  </div>
                  {/* Sil butonu */}
                  <SilButonu onSil={() => handleOgrenciSil(o.studentName)} />
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        /* ── SAĞ: Öğrenci Detay ──────────────────────────────── */
        <div>
          {/* Geri + Başlık */}
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <button onClick={() => { setSeciliOgrenci(null); setAktifSekme("ozet"); }} style={{
              background:BG, border:`1px solid ${BORDER}`, borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, color:MUTED, cursor:"pointer"
            }}>← Geri</button>
            <button onClick={() => handleOgrenciSil(seciliOgrenci)} style={{
              background:"none", border:"1px solid #F28B82", color:"#C5221F",
              borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer"
            }}>🗑 Öğrenciyi Sil</button>
            <button onClick={() => handleOgrenciSil(seciliOgrenci)} style={{
              background:"none", border:"1px solid #F28B82", color:"#C5221F", borderRadius:8, padding:"6px 10px", fontSize:11, fontWeight:700, cursor:"pointer"
            }}>🗑 Sil</button>

          {/* DENEME */}

          {/* PROFİL */}

                  {DIMENSIONS.map(d => {
