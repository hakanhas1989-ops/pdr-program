// ── LGS Deneme Takip Bileşeni ────────────────────────────────────────────────
const LGS_DERSLER = [
  { key: "turkce",   label: "Türkçe",    maks: 20, color: "#E63946" },
  { key: "mat",      label: "Matematik", maks: 20, color: "#457B9D" },
  { key: "fen",      label: "Fen",       maks: 20, color: "#2D6A4F" },
  { key: "sosyal",   label: "Sosyal",    maks: 10, color: "#E76F51" },
  { key: "ingilizce",label: "İngilizce", maks: 10, color: "#7B5EA7" },
  { key: "din",      label: "Din",       maks: 10, color: "#E9C46A" },
];
const DENEME_SAYISI = 10;

function DenemeTabip({ denemeler, setDenemeler, kayitliListesi, aktifOgrenci, handleDenemeAnaliz, denemeAiLoading, denemeAnaliz }) {
  const [seciliOgrenci, setSeciliOgrenci] = useState(aktifOgrenci?.name || kayitliListesi[0]?.name || "");
  // aktifOgrenci değişince güncelle
  useEffect(() => { if (aktifOgrenci?.name) setSeciliOgrenci(aktifOgrenci.name); }, [aktifOgrenci?.name]);
  const [aramaMetni, setAramaMetni] = useState("");
  const [aktifDeneme, setAktifDeneme] = useState(null); // { ogrenci, no }
  const [formNet, setFormNet] = useState({});
  const [kaydedildi, setKaydedildi] = useState(false);

  const filtreliListe = kayitliListesi.filter(o =>
    o.name.toLowerCase().includes(aramaMetni.toLowerCase())
  );

  const ogrenciDenemeler = denemeler[seciliOgrenci] || {};

  // Toplam net hesapla
  function toplamNet(nets) {
    return LGS_DERSLER.reduce((sum, d) => sum + (parseFloat(nets?.[d.key]) || 0), 0);
  }

  // Grafik için veri
  const grafikData = Array.from({ length: DENEME_SAYISI }, (_, i) => {
    const no = i + 1;
    const nets = ogrenciDenemeler[no];
    return { no, nets, toplam: nets ? toplamNet(nets) : null };
  });

  const girilenDenemeler = grafikData.filter(d => d.nets);
  const maxNet = 90;
  const chartW = 280, chartH = 140, padL = 30, padB = 20, padT = 10, padR = 10;
  const innerW = chartW - padL - padR;
  const innerH = chartH - padB - padT;

  // SVG çizgi grafiği
  function LineChart() {
    if (girilenDenemeler.length < 1) return null;
    const points = girilenDenemeler.map((d, i) => ({
      x: padL + (i / Math.max(girilenDenemeler.length - 1, 1)) * innerW,
      y: padT + innerH - ((d.toplam / maxNet) * innerH),
      d
    }));
    const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    const avgNet = girilenDenemeler.reduce((s, d) => s + d.toplam, 0) / girilenDenemeler.length;
    const trend = girilenDenemeler.length > 1
      ? girilenDenemeler[girilenDenemeler.length - 1].toplam - girilenDenemeler[0].toplam
      : 0;

    return (
      <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: TEXT }}>Toplam Net Gelişimi</span>
          <div style={{ display: "flex", gap: 10 }}>
            <span style={{ fontSize: 11, color: MUTED }}>Ort: <b style={{ color: ACCENT }}>{avgNet.toFixed(1)}</b></span>
            <span style={{ fontSize: 11, color: trend >= 0 ? "#1A8C5B" : "#C0392B" }}>
              {trend >= 0 ? "↑" : "↓"} {Math.abs(trend).toFixed(1)}
            </span>
          </div>
        </div>
        <svg width={chartW} height={chartH} style={{ overflow: "visible" }}>
          {/* Grid yatay çizgiler */}
          {[0, 22.5, 45, 67.5, 90].map(v => {
            const y = padT + innerH - (v / maxNet) * innerH;
            return (
              <g key={v}>
                <line x1={padL} y1={y} x2={chartW - padR} y2={y} stroke={BORDER} strokeWidth={0.7} strokeDasharray="3,3" />
                <text x={padL - 4} y={y} textAnchor="end" dominantBaseline="middle" fontSize={8} fill={MUTED}>{v}</text>
              </g>
            );
          })}
          {/* Ortalama çizgisi */}
          {(() => {
            const avgY = padT + innerH - (avgNet / maxNet) * innerH;
            return <line x1={padL} y1={avgY} x2={chartW - padR} y2={avgY} stroke={ACCENT} strokeWidth={1} strokeDasharray="4,4" opacity={0.5} />;
          })()}
          {/* Veri çizgisi */}
          <path d={pathD} fill="none" stroke={ACCENT} strokeWidth={2.5} strokeLinejoin="round" />
          {/* Alan doldurma */}
          <path d={pathD + ` L${points[points.length-1].x},${padT+innerH} L${points[0].x},${padT+innerH} Z`}
            fill={ACCENT} opacity={0.08} />
          {/* Noktalar */}
          {points.map((p, i) => (
            <g key={i}>
              <circle cx={p.x} cy={p.y} r={5} fill={ACCENT} stroke="#fff" strokeWidth={2} />
              <text x={p.x} y={p.y - 10} textAnchor="middle" fontSize={9} fontWeight={700} fill={ACCENT}>
                {p.d.toplam.toFixed(1)}
              </text>
              <text x={p.x} y={padT + innerH + 14} textAnchor="middle" fontSize={8} fill={MUTED}>D{p.d.no}</text>
            </g>
          ))}
        </svg>
        {/* Ders bazlı bar */}
        {girilenDenemeler.length > 0 && (
          <div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: MUTED, marginBottom: 6 }}>Son Deneme Ders Dağılımı</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4 }}>
              {LGS_DERSLER.map(d => {
                const sonDeneme = girilenDenemeler[girilenDenemeler.length - 1];
                const val = parseFloat(sonDeneme?.nets?.[d.key]) || 0;
                const pct = (val / d.maks) * 100;
                return (
                  <div key={d.key} style={{ background: BG, borderRadius: 6, padding: "5px 7px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 9, color: d.color, fontWeight: 700 }}>{d.label}</span>
                      <span style={{ fontSize: 10, fontWeight: 800, color: d.color }}>{val}/{d.maks}</span>
                    </div>
                    <div style={{ height: 4, background: BORDER, borderRadius: 2 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: d.color, borderRadius: 2 }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  // Deneme giriş formu
  function DenemeForm({ no, mevcutNets, onKaydet, onIptal }) {
    const [nets, setNets] = useState({
      turkce: "", mat: "", fen: "", sosyal: "", ingilizce: "", din: "",
      ...mevcutNets
    });
    const toplam = toplamNet(nets);
    return (
      <div style={{ background: CARD, border: `2px solid ${ACCENT}`, borderRadius: 12, padding: 14, marginBottom: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 800, color: ACCENT, marginBottom: 12 }}>Deneme {no} — Net Girişi</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
          {LGS_DERSLER.map(d => (
            <div key={d.key}>
              <label style={{ fontSize: 10, fontWeight: 700, color: d.color, display: "block", marginBottom: 3 }}>
                {d.label} (/{d.maks})
              </label>
              <input
                type="number" step="0.33" min="0" max={d.maks}
                placeholder="0"
                value={nets[d.key]}
                onChange={e => setNets(n => ({ ...n, [d.key]: e.target.value }))}
                style={{ width: "100%", padding: "7px 8px", border: `1px solid ${nets[d.key] ? d.color : BORDER}`, borderRadius: 7, fontSize: 13, fontWeight: 700, textAlign: "center", boxSizing: "border-box", outline: "none", color: d.color }}
              />
            </div>
          ))}
        </div>
        <div style={{ background: ACCENT_LIGHT, borderRadius: 8, padding: "8px 12px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: ACCENT }}>Toplam Net</span>
          <span style={{ fontSize: 22, fontWeight: 900, color: ACCENT }}>{isNaN(toplam) ? "—" : toplam.toFixed(2)}</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onIptal} style={{ flex: 1, padding: "9px", background: CARD, color: MUTED, border: `1px solid ${BORDER}`, borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>İptal</button>
          <button onClick={() => onKaydet(nets)} style={{ flex: 2, padding: "9px", background: ACCENT, color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Kaydet</button>
        </div>
      </div>
    );
  }

  async function handleKaydet(no, nets) {
    const updated = {
      ...denemeler,
      [seciliOgrenci]: { ...(denemeler[seciliOgrenci] || {}), [no]: nets }
    };
    setDenemeler(updated);
    await saveDenemeler(updated);
    setAktifDeneme(null);
    setKaydedildi(no);
    setTimeout(() => setKaydedildi(false), 2000);
  }

  async function handleSil(no) {
    const ogr = { ...(denemeler[seciliOgrenci] || {}) };
    delete ogr[no];
    const updated = { ...denemeler, [seciliOgrenci]: ogr };
    setDenemeler(updated);
    await saveDenemeler(updated);
  }

  return (
    <div>
      <div style={{ background: "#EEF2FF", borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: BLUE, fontWeight: 600 }}>
        📊 LGS Deneme Takibi — 10 deneme, 90 soru, toplam net
      </div>

      {/* Öğrenci arama */}
      <div style={{ marginBottom: 14 }}>
        <input placeholder="Öğrenci ara…" value={aramaMetni}
          onChange={e => setAramaMetni(e.target.value)}
          style={{ width: "100%", padding: "9px 12px", border: `1px solid ${BORDER}`, borderRadius: 10, fontSize: 13, background: CARD, color: TEXT, outline: "none", boxSizing: "border-box" }} />
      </div>

      {kayitliListesi.length === 0 ? (
        <div style={{ textAlign: "center", color: MUTED, marginTop: 30, fontSize: 14 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📊</div>
          Önce görüşme notu veya profil ekleyin.
        </div>
      ) : (
        <>
          {/* Öğrenci listesi */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {filtreliListe.map(o => {
              const ogrNets = denemeler[o.name] || {};
              const dCount = Object.keys(ogrNets).length;
              const s = seciliOgrenci === o.name;
              return (
                <button key={o.name} onClick={() => { setSeciliOgrenci(o.name); setAktifDeneme(null); }} style={{
                  padding: "6px 12px", borderRadius: 20,
                  border: `2px solid ${s ? ACCENT : BORDER}`,
                  background: s ? ACCENT_LIGHT : CARD,
                  color: s ? ACCENT : MUTED,
                  fontSize: 12, fontWeight: s ? 700 : 500, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 5
                }}>
                  {o.name}
                  {dCount > 0 && <span style={{ background: s ? ACCENT : BORDER, color: s ? "#fff" : MUTED, borderRadius: 10, padding: "0 5px", fontSize: 10, fontWeight: 700 }}>{dCount}</span>}
                </button>
              );
            })}
          </div>

          {seciliOgrenci && (
            <>
              {/* Grafik */}
              <LineChart />

              {/* Aktif form */}
              {aktifDeneme && (
                <DenemeForm
                  no={aktifDeneme}
                  mevcutNets={ogrenciDenemeler[aktifDeneme] || {}}
                  onKaydet={(nets) => handleKaydet(aktifDeneme, nets)}
                  onIptal={() => setAktifDeneme(null)}
                />
              )}

              {/* Deneme kartları */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {Array.from({ length: DENEME_SAYISI }, (_, i) => {
                  const no = i + 1;
                  const nets = ogrenciDenemeler[no];
                  const toplam = nets ? toplamNet(nets) : null;
                  const aktif = aktifDeneme === no;
                  const renkSinif = toplam === null ? null : toplam >= 70 ? "#1A8C5B" : toplam >= 50 ? "#B07D1A" : "#C0392B";
                  const bgSinif = toplam === null ? BG : toplam >= 70 ? "#E6F5EE" : toplam >= 50 ? "#FDF6E3" : "#FDECEA";
                  return (
                    <div key={no} style={{
                      background: aktif ? ACCENT_LIGHT : bgSinif,
                      border: `2px solid ${aktif ? ACCENT : (renkSinif || BORDER)}`,
                      borderRadius: 12, padding: 12, cursor: "pointer",
                      transition: "all .15s"
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: nets ? 8 : 0 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: aktif ? ACCENT : TEXT }}>Deneme {no}</span>
                        {kaydedildi === no && <span style={{ fontSize: 10, color: "#1A8C5B", fontWeight: 700 }}>✓</span>}
                      </div>
                      {toplam !== null ? (
                        <>
                          <div style={{ fontSize: 24, fontWeight: 900, color: renkSinif, marginBottom: 4 }}>{toplam.toFixed(2)}</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 8 }}>
                            {LGS_DERSLER.map(d => (
                              <span key={d.key} style={{ fontSize: 9, background: "#fff", color: d.color, borderRadius: 4, padding: "1px 4px", fontWeight: 700 }}>
                                {d.label[0]}: {parseFloat(nets[d.key] || 0).toFixed(2) === (parseFloat(nets[d.key] || 0)).toString() ? parseFloat(nets[d.key] || 0) : parseFloat(nets[d.key] || 0).toFixed(2)}
                              </span>
                            ))}
                          </div>
                          <div style={{ display: "flex", gap: 4 }}>
                            <button onClick={() => setAktifDeneme(aktif ? null : no)} style={{ flex: 1, padding: "5px", background: ACCENT_LIGHT, color: ACCENT, border: "none", borderRadius: 6, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>✏ Düzenle</button>
                            <button onClick={() => handleSil(no)} style={{ padding: "5px 8px", background: "none", border: "1px solid #F28B82", color: "#C5221F", borderRadius: 6, fontSize: 10, cursor: "pointer" }}>✕</button>
                          </div>
                        </>
                      ) : (
                        <button onClick={() => setAktifDeneme(aktif ? null : no)} style={{ width: "100%", padding: "8px", background: aktif ? ACCENT : CARD, color: aktif ? "#fff" : MUTED, border: `1px solid ${aktif ? ACCENT : BORDER}`, borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", marginTop: 4 }}>
                          {aktif ? "Formu Kapat" : "+ Net Gir"}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Özet tablo */}
              {girilenDenemeler.length > 0 && (
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 14, marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: TEXT, marginBottom: 10 }}>Deneme Özeti</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                    {[
                      { label: "Girilen", val: girilenDenemeler.length, color: ACCENT },
                      { label: "En Yüksek", val: Math.max(...girilenDenemeler.map(d => d.toplam)).toFixed(1), color: "#1A8C5B" },
                      { label: "En Düşük", val: Math.min(...girilenDenemeler.map(d => d.toplam)).toFixed(1), color: "#C0392B" },
                      { label: "Ortalama", val: (girilenDenemeler.reduce((s,d)=>s+d.toplam,0)/girilenDenemeler.length).toFixed(1), color: BLUE },
                    ].map(item => (
                      <div key={item.label} style={{ textAlign: "center", background: BG, borderRadius: 8, padding: "8px 4px" }}>
                        <div style={{ fontSize: 16, fontWeight: 900, color: item.color }}>{item.val}</div>
                        <div style={{ fontSize: 10, color: MUTED }}>{item.label}</div>
                      </div>
                    ))}
                  </div>
                  {/* AI Analiz Butonu */}
                  <button onClick={() => handleDenemeAnaliz(seciliOgrenci)} disabled={denemeAiLoading}
                    style={{ width:"100%", padding:"11px", background: denemeAiLoading ? BORDER : "#457B9D", color: denemeAiLoading ? MUTED : "#fff", border:"none", borderRadius:10, fontSize:13, fontWeight:700, cursor:"pointer", marginBottom: denemeAnaliz[seciliOgrenci] ? 12 : 0 }}>
                    {denemeAiLoading ? "⏳ AI analiz yapıyor…" : "✦ AI Deneme & Hazırlık Analizi"}
                  </button>
                  {denemeAnaliz[seciliOgrenci] && (
                    <div style={{ background: "#EEF2FF", border: `1px solid #c7ccf5`, borderRadius: 10, padding: 12 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>✦ AI LGS Hazırlık Analizi</div>
                      <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{denemeAnaliz[seciliOgrenci]}</div>
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </>
      )}
    </div>
  );
}


// ── ProfilMerkez Bileşeni ─────────────────────────────────────────────────────
function ProfilMerkez({
  aktifOgrenci, kayitliListesi,
  profiles, setProfiles,
  profiles2, setProfiles2,
  denemeler, records, kutuphane,
  onRaporAc,
}) {
  // Seçili öğrenci
  const [seciliAd, setSeciliAd] = useState(aktifOgrenci?.name || "");
  const [seciliSinif, setSeciliSinif] = useState(aktifOgrenci?.className || "");
  const [aramaMetni, setAramaMetni] = useState("");
  useEffect(() => {
    if (aktifOgrenci?.name) { setSeciliAd(aktifOgrenci.name); setSeciliSinif(aktifOgrenci.className || ""); }
  }, [aktifOgrenci?.name]);

  // Form state
  const [profForm, setProfForm] = useState({ notes:"", scores:{...EMPTY_SCORES}, analysis:"" });
  const [prof2Form, setProf2Form] = useState({...EMPTY_PROF2});
  const [prof2Analiz, setProf2Analiz] = useState("");
  const [scoresLoading, setScoresLoading] = useState(false);
  const [profAiLoading, setProfAiLoading] = useState(false);
  const [prof2AiLoading, setProf2AiLoading] = useState(false);
  const [scoresSet, setScoresSet] = useState(false);
  const [kaydedildi, setKaydedildi] = useState(false);
  // Görünüm modu: form | onizleme
  const [mod, setMod] = useState("form");
  // P1/P2 aktif alt sekme
  const [altSekme, setAltSekme] = useState("p1");

  // Mevcut kayıtları yükle
  const mevcutP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === seciliAd.toLowerCase().trim());
  const mevcutP2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === seciliAd.toLowerCase().trim());
  const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === seciliAd.toLowerCase().trim());
  const ogrRec2 = ogrRec; // alias for P2 context
  const ogrDeneme = denemeler[seciliAd] || {};
  const denemeGirilen = Object.entries(ogrDeneme).sort((a,b)=>a[0]-b[0]).map(([no,nets])=>({
    no:parseInt(no), nets, toplam: LGS_DERSLER.reduce((s,d)=>s+(parseFloat(nets[d.key])||0),0)
  }));

  useEffect(() => {
    if (!seciliAd) return;
    const p1 = profiles.find(p => p.studentName?.toLowerCase().trim() === seciliAd.toLowerCase().trim());
    const p2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === seciliAd.toLowerCase().trim());
    if (p1) setProfForm({ notes:p1.notes||"", scores:{...EMPTY_SCORES,...p1.scores}, analysis:p1.analysis||"" });
    else setProfForm({ notes:"", scores:{...EMPTY_SCORES}, analysis:"" });
    if (p2) {
      setProf2Form({...EMPTY_PROF2,...p2, sinavlar:{...EMPTY_SINAV,...(p2.sinavlar||{})}, d2:{...EMPTY_D2,...(p2.d2||{})}, ilgiler:p2.ilgiler||[]});
      setProf2Analiz(p2.d2_analiz||"");
    } else {
      setProf2Form({...EMPTY_PROF2});
      setProf2Analiz("");
    }
    setScoresSet(false);
  }, [seciliAd, profiles, profiles2]);

  const filtreliListe = kayitliListesi.filter(o =>
    o.name.toLowerCase().includes(aramaMetni.toLowerCase()) || o.className?.toLowerCase().includes(aramaMetni.toLowerCase())
  );

  // AI: görüşme notlarından puan
  async function handleScoresFromNotes() {
    const ad = seciliAd.toLowerCase().trim();
    const recs = records.filter(r => r.studentName?.toLowerCase().trim() === ad && r.summary);

    // Değerlendirme sorularından mevcut puanları oku
    let degSkorlar = null;
    let degBilgi = "";
    try {
      const degKey = "deg-" + ad.replace(/\s+/g, "-");
      const degData = await window.storage.get(degKey);
      if (degData) {
        const parsed = JSON.parse(degData.value);
        degSkorlar = parsed.skorlar;
        degBilgi = "DEĞERLENDİRME SORUSU PUANLARI (" + (parsed.tarih||"") + "):\n" +
          DIMENSIONS.map(d => d.label + ": " + (parsed.skorlar?.[d.key]||3) + "/5").join(", ");
      }
    } catch {}

    if (recs.length === 0 && !profForm.notes && !degSkorlar) {
      alert("Görüşme notu, danışman notu veya değerlendirme kaydı bulunamadı.");
      return;
    }

    const notlar = [
      recs.length > 0 ? "GÖRÜŞME NOTLARI:\n" + recs.map((r,i)=>`Görüşme ${i+1} (${r.date}): ${r.summary}`).join("\n\n") : "",
      profForm.notes ? "DANIŞMAN NOTU:\n" + profForm.notes : "",
      degBilgi || "",
      mevcutP1?.analysis ? "ÖNCEKİ ANALİZ:\n" + mevcutP1.analysis : ""
    ].filter(Boolean).join("\n\n");

    setScoresLoading(true);
    const aiSkorlar = await getScoresFromNotes(seciliAd, notlar);

    // Ağırlıklı ortalama: görüşme notu varsa %60 AI, %40 değerlendirme; yoksa %100 AI
    let finalSkorlar = aiSkorlar;
    if (degSkorlar) {
      finalSkorlar = {};
      DIMENSIONS.forEach(d => {
        const ai = aiSkorlar[d.key] || 3;
        const deg = degSkorlar[d.key] || 3;
        finalSkorlar[d.key] = Math.round((ai * 0.6) + (deg * 0.4));
      });
    }

    setProfForm(f => ({ ...f, scores: finalSkorlar }));
    setScoresSet(true);
    setScoresLoading(false);
  }

  // AI: P1 analiz
  async function handleP1Analiz() {
    setProfAiLoading(true);
    // Görüşme notlarını da dahil et
    const gorusmeBolum = ogrRec.length > 0
      ? "GÖRÜŞME NOTLARI:\n" + ogrRec.map((r,i)=>`Görüşme ${i+1} (${r.date}${r.topic?", "+r.topic:""}): ${r.summary}`).join("\n\n")
      : "";
    const denemeOzeti = denemeGirilen.length > 0
      ? "DENEME NETLERI: " + denemeGirilen.map(d=>`D${d.no}: ${d.toplam.toFixed(1)}`).join(", ")
      : "";
    const notlar = [gorusmeBolum, profForm.notes, denemeOzeti].filter(Boolean).join("\n\n");
    const analysis = await getProfileAnalysis(seciliAd, seciliSinif, profForm.scores, notlar, kutuphane);
    setProfForm(f => ({ ...f, analysis }));
    setProfAiLoading(false);
  }

  // AI: P2 analiz
  async function handleP2Analiz() {
    setProf2AiLoading(true);
    const gorusmeBolum = ogrRec.length > 0
      ? "GÖRÜŞME NOTLARI:\n" + ogrRec.map((r,i)=>`Görüşme ${i+1} (${r.date}): ${r.summary}`).join("\n\n")
      : "";
    const analiz = await getP2Analiz({
      studentName: seciliAd, className: seciliSinif,
      ...prof2Form,
      gorusmeler: gorusmeBolum,
      denemeGirilen: denemeGirilen
    });
    setProf2Analiz(analiz);
    setProf2AiLoading(false);
  }

  // Kaydet
  async function handleKaydet() {
    if (!seciliAd.trim()) return;
    const adKey = seciliAd.toLowerCase().trim();
    // Stale closure sorununu önle — anlık bul
    const curP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === adKey);
    const curP2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === adKey);
    // P1 kaydet
    const p1 = {
      id: curP1?.id || uid(),
      date: curP1?.date || today(),
      studentName: seciliAd, className: seciliSinif,
      notes: profForm.notes,
      scores: { ...profForm.scores },
      analysis: profForm.analysis
    };
    const updP1 = curP1
      ? profiles.map(p => p.studentName?.toLowerCase().trim() === adKey ? p1 : p)
      : [p1, ...profiles];
    setProfiles(updP1);
    await saveProfiles(updP1);
    // P2 kaydet — tüm alanları koru
    const p2 = {
      id: curP2?.id || uid(),
      date: curP2?.date || today(),
      studentName: seciliAd, className: seciliSinif,
      sinavlar: { ...EMPTY_SINAV, ...(prof2Form.sinavlar || {}) },
      d2: { ...EMPTY_D2, ...(prof2Form.d2 || {}) },
      ilgiler: prof2Form.ilgiler || [],
      ilgiNot: prof2Form.ilgiNot || "",
      kariyer_hedef: prof2Form.kariyer_hedef || "",
      aile_notu: prof2Form.aile_notu || "",
      d2_analiz: prof2Analiz || curP2?.d2_analiz || ""
    };
    const updP2 = curP2
      ? profiles2.map(p => p.studentName?.toLowerCase().trim() === adKey ? p2 : p)
      : [p2, ...profiles2];
    setProfiles2(updP2);
    await saveProfiles2(updP2);
    setKaydedildi(true);
    setTimeout(() => setKaydedildi(false), 2000);
    setMod("onizleme");
  }

  // Radar mini
  const RadarMiniComp = ({ scores }) => {
    if (!scores) return null;
    const cx=110,cy=110,r=80,n=DIMENSIONS.length, step=(2*Math.PI)/n;
    const pt=(i,val)=>{ const a=i*step-Math.PI/2,d=(Math.min(val||0,5)/5)*r; return {x:cx+d*Math.cos(a),y:cy+d*Math.sin(a)}; };
    const dataPts=DIMENSIONS.map((b,i)=>pt(i,scores[b.key]||0));
    const pathD=dataPts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")+" Z";
    return (
      <svg width={220} height={220} viewBox="0 0 220 220">
        {[1,2,3,4,5].map(lv=><polygon key={lv} points={DIMENSIONS.map((_,i)=>{const p=pt(i,lv);return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(" ")} fill="none" stroke={BORDER} strokeWidth={0.8}/>)}
        {DIMENSIONS.map((_,i)=>{const p=pt(i,5);return <line key={i} x1={cx} y1={cy} x2={p.x.toFixed(1)} y2={p.y.toFixed(1)} stroke={BORDER} strokeWidth={0.8}/>;} )}
        <polygon points={dataPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")} fill={`${ACCENT}22`} stroke={ACCENT} strokeWidth={2}/>
        {dataPts.map((p,i)=><circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r={4} fill={DIMENSIONS[i].color} stroke="#fff" strokeWidth={1.5}/>)}
        {DIMENSIONS.map((b,i)=>{
          const a=i*step-Math.PI/2,lx=(cx+(r+20)*Math.cos(a)).toFixed(1),ly=(cy+(r+20)*Math.sin(a)).toFixed(1);
          return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize={8} fontWeight={600} fill={b.color}>{b.label}</text>;
        })}
      </svg>
    );
  };

  const inp = { width:"100%", padding:"9px 11px", border:`1px solid ${BORDER}`, borderRadius:9, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:4, textTransform:"uppercase" };

  return (
    <div>
      {/* Öğrenci seç */}
      <div style={{marginBottom:14}}>
        <input placeholder="Öğrenci ara…" value={aramaMetni} onChange={e=>setAramaMetni(e.target.value)}
          style={{...inp, marginBottom:8}} />
        <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
          {filtreliListe.slice(0,20).map(o=>{
            const s = seciliAd===o.name;
            return (
              <button key={o.name} onClick={()=>{setSeciliAd(o.name);setSeciliSinif(o.className||"");setMod("form");}} style={{
                padding:"5px 12px", borderRadius:20,
                border:`2px solid ${s?ACCENT:BORDER}`,
                background:s?ACCENT_LIGHT:CARD, color:s?ACCENT:MUTED,
                fontSize:12, fontWeight:s?700:500, cursor:"pointer"
              }}>{o.name}{o.className?` · ${o.className}`:""}</button>
            );
          })}
        </div>
        {filtreliListe.length > 20 && <div style={{fontSize:11,color:MUTED,marginTop:4}}>{filtreliListe.length-20} daha — aramayı daralt</div>}
      </div>

      {!seciliAd ? (
        <div style={{textAlign:"center",color:MUTED,marginTop:40,fontSize:14}}>
          <div style={{fontSize:36,marginBottom:8}}>📋</div>
          Yukarıdan bir öğrenci seçin.
        </div>
      ) : (
        <>
          {/* Öğrenci başlık + butonlar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:TEXT}}>{seciliAd}</div>
              <div style={{fontSize:12,color:MUTED}}>{seciliSinif}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setMod(mod==="form"?"onizleme":"form")} style={{
                background:mod==="onizleme"?ACCENT_LIGHT:BG, color:mod==="onizleme"?ACCENT:MUTED,
                border:`1px solid ${BORDER}`, borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer"
              }}>{mod==="form"?"👁 Önizle":"✏ Düzenle"}</button>
              <button onClick={()=>{
                // Her zaman mevcut form state'ini kullan — kayıt bekleme
                const p1Rapor = {

                          {!isNaN(v1)&&<div style={{width:`${v1/2}%`,height:"100%",background:d.color,borderRadius:4,opacity:0.6}}/>}
                          {!isNaN(v2)&&<div style={{width:`${v2/2}%`,height:"100%",background:d.color,borderRadius:4}}/>}
                        </div>
                        <div style={{fontSize:9,color:MUTED,marginTop:2}}>Maks: 100 · Bar = yazılı puanları</div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* İlgi + Kariyer */}
              {mevcutP2 && (mevcutP2.ilgiler?.length>0 || mevcutP2.kariyer_hedef) && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  {mevcutP2.kariyer_hedef && <div style={{fontSize:13,marginBottom:8}}><b style={{color:ACCENT}}>Kariyer Hedefi:</b> {mevcutP2.kariyer_hedef}</div>}
                  {mevcutP2.ilgiler?.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {mevcutP2.ilgiler.map(i=><span key={i} style={{background:"#FEF9C3",color:"#92400E",borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:600}}>{i}</span>)}
                  </div>}
                </div>
              )}

              {/* Görüşme özeti */}
              {ogrRec.length > 0 && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Görüşme Geçmişi ({ogrRec.length})</div>
                  {ogrRec.slice(0,3).map(r=>(
                    <div key={r.id} style={{marginBottom:8,padding:8,background:BG,borderRadius:6,borderLeft:`3px solid ${ACCENT}`}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:3}}>{r.date} · {r.topic||"Genel"}</div>
                      <div style={{fontSize:12,color:TEXT,lineHeight:1.6}}>{r.summary}</div>
                    </div>
                  ))}
                  {ogrRec.length>3 && <div style={{fontSize:11,color:MUTED,textAlign:"center"}}>+{ogrRec.length-3} görüşme daha</div>}
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Sınıf Profili Bileşeni ────────────────────────────────────────────────────
function SinifProfili({ profiles }) {
  const siniflar = [...new Set(profiles.map(p => p.className).filter(Boolean))].sort();
  const [seciliSinif, setSeciliSinif] = useState(siniflar[0] || "");
  const sinifOgrencileri = profiles.filter(p => p.className === seciliSinif);
  const boyutOrtalamalari = DIMENSIONS.map(d => {
    const vals = sinifOgrencileri.map(p => p.scores?.[d.key] || 0);
    const ort = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : 0;
    return { ...d, ort: parseFloat(ort) };
  });

  return (
    <div>
      <div style={{ background: "#EEF2FF", borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: BLUE, fontWeight: 600 }}>
        🏫 Bir sınıftaki tüm öğrencilerin Profil 1 puanlarını karşılaştır
      </div>
      {siniflar.length === 0 ? (
        <div style={{ textAlign: "center", color: MUTED, marginTop: 40, fontSize: 14 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🏫</div>
          Henüz sınıf bilgisi olan Profil 1 kaydı yok.
        </div>
      ) : (
        <>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {siniflar.map(s => (
              <button key={s} onClick={() => setSeciliSinif(s)} style={{
                padding: "6px 14px", borderRadius: 20,
                border: `2px solid ${seciliSinif === s ? BLUE : BORDER}`,
                background: seciliSinif === s ? "#EEF2FF" : CARD,
                color: seciliSinif === s ? BLUE : MUTED,
                fontSize: 13, fontWeight: 700, cursor: "pointer"
              }}>{s}</button>
            ))}
          </div>
          {seciliSinif && sinifOgrencileri.length > 0 && (
            <>
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>
                  {seciliSinif} — Sınıf Ortalaması ({sinifOgrencileri.length} öğrenci)
                </div>
                {boyutOrtalamalari.map(d => (
                  <div key={d.key} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: TEXT }}>{d.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 800, color: d.color }}>{d.ort}</span>
                    </div>
                    <div style={{ height: 8, background: BG, borderRadius: 4 }}>
                      <div style={{ width: `${(d.ort/5)*100}%`, height: "100%", background: d.color, borderRadius: 4 }} />
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, overflow: "hidden" }}>
                <div style={{ padding: "10px 14px", borderBottom: `1px solid ${BORDER}`, background: BG, display: "grid", gridTemplateColumns: "1fr repeat(8, auto)", gap: 4, alignItems: "center" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: TEXT }}>Öğrenci</span>
                  {DIMENSIONS.map(d => (
                    <span key={d.key} title={d.label} style={{ color: d.color, fontSize: 9, textAlign: "center", fontWeight: 700 }}>
                      {d.label.split(" ")[0].substring(0,4)}
                    </span>
                  ))}
                </div>
                {[...sinifOgrencileri].sort((a,b) => {
                  const aOrt = DIMENSIONS.reduce((s,d)=>s+(a.scores?.[d.key]||0),0)/DIMENSIONS.length;
                  const bOrt = DIMENSIONS.reduce((s,d)=>s+(b.scores?.[d.key]||0),0)/DIMENSIONS.length;
                  return bOrt - aOrt;
                }).map((p, idx) => {
                  const dusukBoyutlar = DIMENSIONS.filter(d => (p.scores?.[d.key]||0) <= 2).map(d => d.label);
                  return (
                    <div key={p.id} style={{ padding: "8px 14px", borderBottom: `1px solid ${BG}`, background: idx%2===0 ? CARD : BG, display: "grid", gridTemplateColumns: "1fr repeat(8, auto)", gap: 4, alignItems: "center" }}>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: TEXT }}>{p.studentName}</div>
                        {dusukBoyutlar.length > 0 && <div style={{ fontSize: 9, color: ORANGE }}>⚠ {dusukBoyutlar.join(", ")}</div>}
                      </div>
                      {DIMENSIONS.map(d => {
                        const val = p.scores?.[d.key] || 0;
                        const bg = val >= 4 ? "#E6F5EE" : val >= 3 ? BG : val >= 2 ? "#FDF6E3" : "#FDECEA";
                        return (
                          <div key={d.key} style={{ background: bg, borderRadius: 5, width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: d.color }}>
                            {val}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 8, fontSize: 11, color: MUTED }}>⚠ = 2 veya altı puan · Yüksek ortalamadan düşüğe sıralı</div>
            </>
          )}
        </>
      )}

    </div>
  );
}

// ── Kütüphane Ekle Bileşeni ───────────────────────────────────────────────────
function KutuphaneEkle({ kutuphane, setKutuphane }) {
  const [mod, setMod] = useState("dosya");
  const [yeniBaslik, setYeniBaslik] = useState("");
  const [yeniMetin, setYeniMetin] = useState("");
  const [yeniLink, setYeniLink] = useState("");
  const [yukleniyor, setYukleniyor] = useState(false);

  const stl = { width:"100%", padding:"9px 11px", border:`1px solid ${BORDER}`, borderRadius:9, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:4, textTransform:"uppercase" };

  async function aiOzetle(metin, baslik) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:800,
        system:"Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin. Verilen metni su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR (BDT, baglanma, sosyoloji, felsefe) 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
        messages:[{role:"user", content:`Başlık: ${baslik||"Belirtilmemiş"}\n\nMetin:\n${metin.substring(0,8000)}`}]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || metin.substring(0,400);
  }

  async function kaydet(ozet, baslik, kaynak) {
    const yeni = {id:uid(), baslik:baslik||"İsimsiz Kaynak", dosyaAdi:kaynak, ozet, tarih:today()};
    const updated = [yeni, ...kutuphane];
    setKutuphane(updated);
    await saveKutuphane(updated);
    setYeniBaslik(""); setYeniMetin(""); setYeniLink("");
  }

  async function handleDosya(file) {
    if (!file) return;
    setYukleniyor(true);
    try {
      const baslik = yeniBaslik || file.name.replace(/\.pdf$/i,"");
      if (file.type === "application/pdf") {
        const b64 = await new Promise((res,rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-6", max_tokens:800,
            system:"Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip, okul psikolojik danismanligi alaninda uzmanlasmis bir psikolog ve PDR uzmanisin. Bilissel Davranisci Terapi (BDT) temel yonelimindir: otomatik dusunceler, bilissel carpitmalar, sema teorisi, davranissal aktivasyon ve maruz birakma tekniklerini klinik pratikte ustaca kullanirsin. Baglanma teorisi (Bowlby, Ainsworth), aile sistemleri terapisi (Minuchin, Bowen) ve gelisim psikolojisi (Piaget, Vygotsky, Erikson) perspektifinden bireyi cevresiyle birlikte degerlendirirsin. Sosyolojide Bourdieu'nun habitus ve kulturel sermaye kavramlari, Giddens'in yapilasmasi ve sosyal tabakalasmanin psikolojik etkilerini Turkiye baglaminda okursun: aile baskisi, toplumsal cinsiyet rolleri, sinav odakli egitimin cocuk uzerindeki yukunu sosyolojik zemine oturtursun. Felsefi temetin: Frankl anlam terapisi, Sartre sorumluluk etigi, Stoa kontrol alani, fenomenolojinin oznel deneyim odagi. Uslubun: yargilamayan, merak eden, guclu yonlere odaklanan, somut ve uygulanabilir oneriler sunan, Turkce yazan, PDR diline hakim bir klinisyen. Verilen icerigi su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR (BDT, baglanma, sosyoloji, felsefe perspektifinden) 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
            messages:[{role:"user", content:[
              {type:"document", source:{type:"base64", media_type:"application/pdf", data:b64}},
              {type:"text", text:`Bu belgeyi PDR perspektifinden özetle. Başlık: ${baslik}`}
            ]}]
          })
        });
        const data = await resp.json();
        const ozet = data.content?.[0]?.text || "Özet alınamadı.";
        await kaydet(ozet, baslik, file.name);
      } else {
        const metin = await file.text();
        const ozet = await aiOzetle(metin, baslik);
        await kaydet(ozet, baslik, file.name);
      }
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }

  async function handleLink() {
    if (!yeniLink.trim()) return;
    setYukleniyor(true);
    try {
      const baslik = yeniBaslik || yeniLink;

      // 1. Sayfayı fetch et
      let sayfaIcerigi = "";
      try {
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(yeniLink);
        const fetchResp = await fetch(proxyUrl);
        const fetchData = await fetchResp.json();
        const html = fetchData.contents || "";
        const div = document.createElement("div");
        div.innerHTML = html;
        div.querySelectorAll("script,style,nav,footer,header").forEach(el => el.remove());
        sayfaIcerigi = (div.innerText || div.textContent || "").replace(/\s+/g, " ").trim().substring(0, 8000);
      } catch { sayfaIcerigi = ""; }

      const mesaj = sayfaIcerigi
        ? "Bu web sayfası içeriğini PDR perspektifinden özetle.\nURL: " + yeniLink + "\n\nİÇERİK:\n" + sayfaIcerigi
        : "Bu web sayfasının içeriğini PDR perspektifinden özetle: " + yeniLink;

      const bodyObj = {
        model: "claude-sonnet-4-6", max_tokens: 800,
        system: "Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT, baglanma teorisi, gelisim psikolojisi, Bourdieu sosyolojisi ve Frankl felsefesi perspektifinden kaynaklari analiz edersin. Verilen icerigi su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
        messages: [{ role: "user", content: mesaj }]
      };
      if (!sayfaIcerigi) bodyObj.tools = [{ type: "web_search_20250305", name: "web_search" }];

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(bodyObj)
      });
      const data = await resp.json();
      const ozet = data.content?.find(b => b.type === "text")?.text || "İçerik okunamadı.";
      await kaydet(ozet, baslik, yeniLink);
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }
  async function handleMetin() {
    if (!yeniMetin.trim()) return;
    setYukleniyor(true);
    try {
      const ozet = await aiOzetle(yeniMetin, yeniBaslik);
      await kaydet(ozet, yeniBaslik, "metin");
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }

  return (
    <div style={{background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:16, marginBottom:16}}>
      <div style={{fontSize:12, fontWeight:700, color:TEXT, marginBottom:12}}>Kaynak Ekle</div>
      <div style={{display:"flex", gap:6, marginBottom:14}}>
        {[["dosya","📄 Dosya"],["link","🔗 Link"],["metin","📝 Metin"]].map(([k,l]) => (
          <button key={k} onClick={() => setMod(k)} style={{
            flex:1, padding:"8px 4px", borderRadius:8,
            border:`2px solid ${mod===k ? ACCENT : BORDER}`,
            background:mod===k ? ACCENT_LIGHT : CARD,
            color:mod===k ? ACCENT : MUTED,
            fontSize:11, fontWeight:700, cursor:"pointer"
          }}>{l}</button>
        ))}
      </div>
      <label style={lbl}>BAŞLIK (isteğe bağlı)</label>
      <input placeholder="örn. Bağlanma Teorisi — Bowlby" value={yeniBaslik}
        onChange={e => setYeniBaslik(e.target.value)} style={{...stl, marginBottom:12}} />

        {yukleniyor ? (
          <div style={{color:MUTED, fontSize:13, padding:20, textAlign:"center"}}>⏳ AI okuyor ve özetliyor… (30-60 sn)</div>
        ) : (
          <div style={{textAlign:"center"}}>
            <div style={{border:`2px dashed ${BORDER}`, borderRadius:10, padding:24, background:BG}}
              onDragOver={e => { e.preventDefault(); e.stopPropagation(); }}
              onDrop={e => { e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) handleDosya(f); }}
            >
              <div style={{fontSize:36, marginBottom:8}}>📄</div>
              <div style={{fontSize:13, color:TEXT, fontWeight:600, marginBottom:12}}>PDF veya metin dosyası</div>
              <div style={{ position:"relative", display:"inline-block" }}>
                <div style={{
                  background:ACCENT, color:"#fff",
                  borderRadius:10, padding:"11px 28px", fontSize:14, fontWeight:700,
                  pointerEvents:"none"
                }}>
                  📂 Dosya Seç
                </div>
                <input type="file" accept=".pdf,.txt,.doc,application/pdf,text/plain"
                  style={{
                    position:"absolute", top:0, left:0, width:"100%", height:"100%",
                    opacity:0, cursor:"pointer", fontSize:16, margin:0, padding:0
                  }}
                  onChange={e => { const f=e.target.files?.[0]; if(f){handleDosya(f); e.target.value="";} }} />
              </div>
              <div style={{fontSize:11, color:MUTED, marginTop:10}}>PDF, TXT · Bilgisayarda sürükle bırak da çalışır</div>
            </div>
          </div>
        )}



      {mod === "link" && (
        <>
          <label style={lbl}>MAKALE / WEB SAYFASI LİNKİ</label>
          <input placeholder="https://…" value={yeniLink}
            onChange={e => setYeniLink(e.target.value)} style={{...stl, marginBottom:10}} />
          <button onClick={handleLink} disabled={!yeniLink.trim() || yukleniyor} style={{
            width:"100%", padding:"10px", border:"none", borderRadius:10,
            background:yeniLink.trim() && !yukleniyor ? ACCENT : BORDER,
            color:yeniLink.trim() && !yukleniyor ? "#fff" : MUTED,
            fontSize:13, fontWeight:700, cursor:"pointer"
          }}>{yukleniyor ? "⏳ İçerik okunuyor…" : "✦ AI Özetleyerek Kaydet"}</button>
        </>
      )}

      {mod === "metin" && (
        <>
          <label style={lbl}>METİN (yapıştırın)</label>
          <textarea placeholder="Kitap bölümü, makale veya notlarınızı yapıştırın…"
            value={yeniMetin} onChange={e => setYeniMetin(e.target.value)}
            rows={6} style={{...stl, resize:"vertical", lineHeight:1.6, marginBottom:10}} />
          <button onClick={handleMetin} disabled={!yeniMetin.trim() || yukleniyor} style={{
            width:"100%", padding:"10px", border:"none", borderRadius:10,
            background:yeniMetin.trim() && !yukleniyor ? ACCENT : BORDER,
            color:yeniMetin.trim() && !yukleniyor ? "#fff" : MUTED,
            fontSize:13, fontWeight:700, cursor:"pointer"
          }}>{yukleniyor ? "⏳ AI özetliyor…" : "✦ AI Özetleyerek Kaydet"}</button>
        </>
      )}
    </div>
  );
}
// ── Badge / StatBar ───────────────────────────────────────────────────────────
function Badge({ label, type }) {
  const color = type === "Veli" ? ORANGE : ACCENT;
  const bg = type === "Veli" ? "#FDEBD0" : ACCENT_LIGHT;
  return <span style={{ background: bg, color, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>;
}
function StatBar({ label, value, max, color = ACCENT }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 13, color: TEXT }}>{label}</span>
        <span style={{ fontSize: 13, fontWeight: 700, color }}>{value}</span>
      </div>
      <div style={{ height: 6, background: BORDER, borderRadius: 4 }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
      </div>
    </div>
  );
}

function RecordCard({ rec, onDelete, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [duzenle, setDuzenle] = useState(false);
  const [editForm, setEditForm] = useState({ summary: rec.summary, topic: rec.topic || "", raw: rec.raw || "" });
  const [aiLoading, setAiLoading] = useState(false);
  const [kaydedildi, setKaydedildi] = useState(false);
  const isVeli = rec.meetingType === "Veli";

  async function handleAiRewrite() {
    if (!editForm.raw.trim()) return;
    setAiLoading(true);
    const summary = await getAISummary(editForm.raw);
    setEditForm(f => ({ ...f, summary }));
    setAiLoading(false);
  }

  function handleSave() {
    onUpdate(rec.id, { summary: editForm.summary, topic: editForm.topic, raw: editForm.raw });
    setDuzenle(false);
    setKaydedildi(true);
    setTimeout(() => setKaydedildi(false), 2000);
  }

  return (
    <div style={{ background: CARD, border: `1px solid ${duzenle ? ACCENT : BORDER}`, borderRadius: 12, marginBottom: 10, overflow: "hidden", transition: "border .2s" }}>
      <div onClick={() => { if (!duzenle) setOpen(o => !o); }} style={{
        display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", cursor: duzenle ? "default" : "pointer",
        borderBottom: open ? `1px solid ${BORDER}` : "none"
      }}>
        <div style={{
          width: 36, height: 36, borderRadius: "50%",
          background: isVeli ? "#FDEBD0" : ACCENT_LIGHT, color: isVeli ? ORANGE : ACCENT,
          display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 15
        }}>{rec.studentName.charAt(0).toUpperCase()}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: TEXT }}>{rec.studentName}</div>
          <div style={{ fontSize: 12, color: MUTED }}>{rec.date} · {rec.className}</div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <Badge label={rec.meetingType || "Öğrenci"} type={rec.meetingType} />
          {(editForm.topic || rec.topic) && <Badge label={editForm.topic || rec.topic} />}
        </div>
        {!duzenle && <span style={{ color: MUTED, fontSize: 18 }}>{open ? "▲" : "▼"}</span>}
      </div>

      {open && !duzenle && (
        <div style={{ padding: "14px 16px" }}>
          <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 12 }}>{rec.summary}</div>
          {rec.raw && (

            borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", marginBottom: 10
          }}>{aiLoading ? "AI yeniden özetliyor…" : "✦ AI ile Özeti Güncelle"}</button>

          <label style={{ fontSize: 11, fontWeight: 600, color: MUTED, display: "block", marginBottom: 4 }}>ÖZET</label>
          <textarea value={editForm.summary} onChange={e => setEditForm(f => ({ ...f, summary: e.target.value }))}
            rows={5} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${ACCENT_LIGHT}`, background: "#F0FAF4", borderRadius: 8, fontSize: 13, resize: "vertical", marginBottom: 12, boxSizing: "border-box", fontFamily: "inherit", lineHeight: 1.7 }} />

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { setDuzenle(false); setEditForm({ summary: rec.summary, topic: rec.topic || "", raw: rec.raw || "" }); }} style={{
              flex: 1, padding: "9px", background: CARD, color: MUTED, border: `1px solid ${BORDER}`, borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer"
            }}>İptal</button>
            <button onClick={handleSave} style={{
              flex: 2, padding: "9px", background: ACCENT, color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 800, cursor: "pointer"
            }}>Kaydet</button>
          </div>
        </div>
      )}
    </div>
  );
}

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Tarayıcınız sesli girişi desteklemiyor."); return; }
    const r = new SR();
    r.lang = "tr-TR"; r.continuous = true; r.interimResults = false;
    r.onresult = (e) => { const t = Array.from(e.results).map(x => x[0].transcript).join(" "); setForm(f => ({ ...f, raw: f.raw + " " + t })); };
    r.onerror = () => setListening(false); r.onend = () => setListening(false);
    recogRef.current = r; r.start(); setListening(true);
  }
  function stopListening() { recogRef.current?.stop(); setListening(false); }

  async function handleSummarize() {
    if (!form.raw.trim()) return;
    setAiLoading(true);
    const summary = await getAISummary(form.raw);
    setForm(f => ({ ...f, summary }));
    setAiLoading(false);
  }

  async function handleSave() {
    if (!form.studentName.trim() || !form.summary.trim()) return;
    const rec = { id: uid(), date: today(), ...form };

    setRecords(updated); await saveRecords(updated);

  }

    setProfAiLoading(true);
    // Öğrencinin deneme verilerini de bağlama ekle
    const ogrenciDenemeler = denemeler[profForm.studentName] || {};
    const denemeOzeti = Object.entries(ogrenciDenemeler).length > 0
      ? "DENEME SONUÇLARI: " + Object.entries(ogrenciDenemeler)
          .sort((a,b) => a[0]-b[0])
          .map(([no, nets]) => {
            const toplam = LGS_DERSLER.reduce((s,d) => s+(parseFloat(nets[d.key])||0), 0);

          }).join(", ")
      : "";
    const notlarVeDeneme = [profForm.notes, denemeOzeti].filter(Boolean).join("\n");

                          background: s ? "#FDECEA" : CARD,
                          color: s ? "#C0392B" : MUTED,
                          fontSize: 11, fontWeight: s ? 700 : 500, cursor: "pointer"
                        }}>{o.name}</button>
                      );
                    })}
                  </div>
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div><label style={labelStyle}>AD SOYAD</label>
                  <input placeholder="Ad Soyad" value={riskForm.studentName} onChange={e => setRiskForm(f=>({...f, studentName:e.target.value}))} style={inputStyle} /></div>
                <div><label style={labelStyle}>SINIF</label>
                  <input placeholder="7-A" value={riskForm.className} onChange={e => setRiskForm(f=>({...f, className:e.target.value}))} style={inputStyle} /></div>
              </div>
              <div style={{ marginBottom: 8 }}>
                <label style={labelStyle}>RİSK TÜRÜ</label>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {["Davranış", "Akademik", "Aile", "Akran / Zorbalık", "Duygusal", "Devamsızlık", "Öz Zarar", "Diğer"].map(t => (
                    <button key={t} onClick={() => setRiskForm(f=>({...f, riskTuru:t}))} style={{
                      padding: "5px 10px", borderRadius: 16,
                      border: `2px solid ${riskForm.riskTuru===t ? "#C0392B" : BORDER}`,
                      background: riskForm.riskTuru===t ? "#FDECEA" : CARD,
                      color: riskForm.riskTuru===t ? "#C0392B" : MUTED,
                      fontSize: 12, fontWeight: riskForm.riskTuru===t ? 700 : 500, cursor: "pointer"
                    }}>{t}</button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 8 }}>
                <label style={labelStyle}>ÖNCELİK</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["Yüksek","#C0392B","#FDECEA"],["Orta","#B07D1A","#FDF6E3"],["Düşük","#2D6A4F","#E6F5EE"]].map(([p,c,bg]) => (
                    <button key={p} onClick={() => setRiskForm(f=>({...f, oncelik:p}))} style={{
                      flex:1, padding:"7px", border:`2px solid ${riskForm.oncelik===p ? c : BORDER}`,
                      borderRadius:8, background: riskForm.oncelik===p ? bg : CARD,
                      color: riskForm.oncelik===p ? c : MUTED, fontSize:12, fontWeight:700, cursor:"pointer"
                    }}>{p}</button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={labelStyle}>AÇIKLAMA / GÖZLEM</label>
                <textarea placeholder="Risk durumu hakkında kısa açıklama…" value={riskForm.aciklama}
                  onChange={e => setRiskForm(f=>({...f, aciklama:e.target.value}))}
                  rows={2} style={{...inputStyle, resize:"vertical"}} />
              </div>
              <button onClick={handleRiskEkle} disabled={!riskForm.studentName.trim() || riskAiLoading} style={{
                width:"100%", padding:"11px",
                background: riskAiLoading ? BORDER : riskForm.studentName ? "#C0392B" : BORDER,
                color: riskAiLoading || !riskForm.studentName ? MUTED : "#fff",
                border:"none", borderRadius:10, fontSize:14, fontWeight:800, cursor:"pointer"
              }}>{riskAiLoading ? "⏳ AI risk analizi yapıyor…" : "✦ AI Analiz Et ve Kaydet"}</button>
            </div>

            {/* Aktif riskler */}
            {(() => {
              const aktif = riskListesi.filter(r => !r.kapandi);
              const kapali = riskListesi.filter(r => r.kapandi);
              const oncelikRenk = { "Yüksek": ["#C0392B","#FDECEA"], "Orta": ["#B07D1A","#FDF6E3"], "Düşük": ["#2D6A4F","#E6F5EE"] };
              return (
                <>
                  {aktif.length === 0 && <div style={{ textAlign:"center", color:MUTED, marginTop:20, fontSize:14 }}>Aktif risk kaydı yok ✓</div>}
                  {aktif.map(r => {
                    const [rc, rbg] = oncelikRenk[r.oncelik] || ["#888","#eee"];
                    return (
                      <div key={r.id} style={{ background: CARD, border:`2px solid ${rc}22`, borderLeft:`4px solid ${rc}`, borderRadius:12, padding:14, marginBottom:10 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                          <div>
                            <div style={{ fontWeight:800, fontSize:14, color:TEXT }}>{r.studentName}</div>
                            <div style={{ fontSize:11, color:MUTED }}>{r.tarih} · {r.className}</div>
                          </div>
                          <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                            <span style={{ background:rbg, color:rc, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>{r.oncelik}</span>
                            {r.riskTuru && <span style={{ background:"#FDECEA", color:"#C0392B", borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>{r.riskTuru}</span>}
                          </div>
                        </div>
                        {r.aciklama && <div style={{ fontSize:12, color:TEXT, lineHeight:1.6, marginBottom:10 }}>{r.aciklama}</div>}
                        <div style={{ display:"flex", gap:8 }}>
                          {r.aiAnaliz && (() => {
                            const duz = r.aiAnaliz.includes("YÜKSEK") ? "YÜKSEK" : r.aiAnaliz.includes("ORTA") ? "ORTA" : "HAFİF";
                            const dc = duz==="YÜKSEK" ? "#C0392B" : duz==="ORTA" ? "#B07D1A" : "#1A8C5B";
                            const dbg = duz==="YÜKSEK" ? "#FDECEA" : duz==="ORTA" ? "#FDF6E3" : "#E6F5EE";
                            return (
                              <div style={{ marginBottom:8 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                                  <span style={{ background:dbg, color:dc, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800 }}>
                                    {duz==="YÜKSEK"?"🔴":"duz"==="ORTA"?"🟡":"🟢"} Risk Düzeyi: {duz}
                                  </span>
                                </div>
                                <div style={{ fontSize:12, color:TEXT, lineHeight:1.7, whiteSpace:"pre-wrap", background:"#FAFDF7", borderRadius:8, padding:10 }}>
                                  {r.aiAnaliz}
                                </div>
                              </div>
                            );
                          })()}
                        <button onClick={() => handleRiskKapat(r.id)} style={{ flex:1, padding:"7px", background:ACCENT_LIGHT, color:ACCENT, border:"none", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer" }}>✓ Kapat</button>
                          <button onClick={() => handleRiskSil(r.id)} style={{ padding:"7px 12px", background:"none", border:`1px solid #F28B82`, color:"#C5221F", borderRadius:8, fontSize:12, cursor:"pointer" }}>Sil</button>
                        </div>
                      </div>
                    );
                  })}
                  {kapali.length > 0 && (
                    <details style={{ marginTop:16 }}>
                      <summary style={{ fontSize:12, color:MUTED, cursor:"pointer", fontWeight:600 }}>Kapatılan kayıtlar ({kapali.length})</summary>
                      {kapali.map(r => (
                        <div key={r.id} style={{ background:BG, border:`1px solid ${BORDER}`, borderRadius:10, padding:10, marginTop:8, opacity:0.7 }}>
                          <div style={{ display:"flex", justifyContent:"space-between" }}>
                            <div style={{ fontSize:12, fontWeight:700 }}>{r.studentName} · {r.riskTuru}</div>
                            <button onClick={() => handleRiskSil(r.id)} style={{ background:"none", border:"none", color:MUTED, cursor:"pointer", fontSize:11 }}>Sil</button>
                          </div>
                          <div style={{ fontSize:11, color:MUTED }}>{r.tarih} → {r.kapanmaTarih}</div>
                        </div>
                      ))}
                    </details>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {/* ── KÜTÜPHANE ────────────────────────────────────────────── */}
        {tab === "kutuphane" && (
          <div>
            <div style={{ background: "#FEF9C3", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#92400E", fontWeight: 600, lineHeight: 1.6 }}>
              📚 PDF yükle → AI özetlesin → Profil analizlerinde teorik referans olarak kullansın.
              {kutuphane.length > 0 && <span style={{ color: ACCENT, fontWeight: 700 }}> ({kutuphane.length} kaynak yüklü)</span>}
            </div>

            <KutuphaneEkle kutuphane={kutuphane} setKutuphane={setKutuphane} />

            {/* Yüklü Kaynaklar */}
            {kutuphane.length === 0 ? (
              <div style={{ textAlign: "center", color: MUTED, marginTop: 20, fontSize: 14 }}>
                Henüz kaynak yüklenmedi.
              </div>
            ) : kutuphane.map(k => (
              <div key={k.id} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, marginBottom: 10, overflow: "hidden" }}>
                <div style={{ padding: "12px 16px", borderBottom: `1px solid ${BORDER}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: TEXT, marginBottom: 2 }}>📄 {k.baslik}</div>
                      <div style={{ fontSize: 11, color: MUTED }}>{k.tarih} · {k.dosyaAdi}</div>
                    </div>
                    <button onClick={() => handleKutuphaneDelete(k.id)} style={{
                      background: "none", border: "1px solid #F28B82", color: "#C5221F",
                      borderRadius: 8, padding: "3px 10px", fontSize: 11, cursor: "pointer", flexShrink: 0
                    }}>Sil</button>
                  </div>
                </div>
                <div style={{ padding: "12px 16px", fontSize: 12, color: TEXT, lineHeight: 1.7, whiteSpace: "pre-wrap", background: "#FAFDF7" }}>
                  {k.ozet}
                </div>
              </div>
            ))}

            {kutuphane.length > 0 && (
              <div style={{ background: ACCENT_LIGHT, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: ACCENT, fontWeight: 600, marginTop: 8 }}>
                ✓ Bu {kutuphane.length} kaynak, Profil 1 AI analizi yapılırken otomatik referans alınacak.
              </div>
            )}
          </div>
        )}

        {/* ── İSTATİSTİK ───────────────────────────────────────────── */}
        {tab === "istatistik" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
              {[
                { label: "Toplam Görüşme", value: totalRecs, color: ACCENT },
                { label: "Öğrenci Görüşmesi", value: studentRecs.length, color: ACCENT },
                { label: "Veli Görüşmesi", value: veliRecs.length, color: ORANGE },
                { label: "Farklı Öğrenci", value: uniqueStudents, color: BLUE },
                { label: "Profil Kaydı", value: profiles.length, color: PURPLE },
              ].map(c => (
                <div key={c.label} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: c.color }}>{c.value}</div>
                  <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>{c.label}</div>
                </div>
              ))}
            </div>
            {topTopics.length > 0 && (
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 14 }}>Konulara Göre</div>
                {topTopics.map(([topic, count]) => <StatBar key={topic} label={topic} value={count} max={maxTopic} color={ACCENT} />)}
              </div>
            )}
            {Object.keys(monthCount).length > 0 && (
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 14 }}>Aylara Göre</div>
                {Object.entries(monthCount).map(([month, count]) => <StatBar key={month} label={month} value={count} max={maxMonth} color={BLUE} />)}
              </div>
            )}
            {totalRecs === 0 && <div style={{ textAlign: "center", color: MUTED, marginTop: 40, fontSize: 14 }}><div style={{ fontSize: 36, marginBottom: 8 }}>📊</div>Henüz kayıt yok.</div>}
            <button onClick={() => exportToExcel(records)} disabled={totalRecs === 0} style={{
              width: "100%", padding: 13, background: totalRecs > 0 ? ACCENT : BORDER,
              color: totalRecs > 0 ? "#fff" : MUTED, border: "none", borderRadius: 12, fontSize: 15, fontWeight: 800, cursor: totalRecs > 0 ? "pointer" : "default"
            }}>⬇ Excel'e Aktar</button>
          </div>
        )}
      </div>
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "10px 12px", border: `1px solid ${BORDER}`,
  borderRadius: 10, fontSize: 14, background: CARD, color: TEXT,
  outline: "none", boxSizing: "border-box", fontFamily: "inherit"
};
const labelStyle = { fontSize: 11, fontWeight: 600, color: MUTED, display: "block", marginBottom: 4 };

const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
root.render(React.createElement(App));
setTimeout(()=>{const s=document.getElementById("splash");if(s)s.className="hide";},800);
</script>

</body>
</html>
